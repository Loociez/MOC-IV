<!DOCTYPE html>
<html class="theme-default">
<head>
  <meta charset="UTF-8">
  <title>Poison Damage Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Poison Damage Calculator</h1>

<div style="max-width:400px; margin: 0 auto; text-align:center;">

  <label>Level:</label><br>
  <input type="number" id="level" value="1"><br><br>

  <label>Min Damage:</label><br>
  <input type="number" id="minDamage" value="100"><br><br>

  <label>Max Damage:</label><br>
  <input type="number" id="maxDamage" value="200"><br><br>

  <label>Poison Ticks:</label><br>
  <input type="number" id="ticks" value="5"><br><br>

  <label>Item % Bonus:</label><br>
  <input type="number" id="itemPercent" value="0"><br><br>

  <button onclick="calculate()">Calculate</button>

  <h3 id="result"></h3>

</div>

<script>
function calculate() {
    const level = parseInt(document.getElementById("level").value);
    const minDamage = parseFloat(document.getElementById("minDamage").value);
    const maxDamage = parseFloat(document.getElementById("maxDamage").value);
    const poisonTicks = parseInt(document.getElementById("ticks").value);
    const itemPercent = parseFloat(document.getElementById("itemPercent").value);

    const poisonMod = 0.33 + (Math.floor(level / 10) * 0.03);
    const itemMod = 1 + (itemPercent / 100);

    const variance = 0.12;

    // =========================
    // BASE (NO VARIANCE)
    // =========================
    const baseLowTick = Math.round((minDamage * poisonMod * itemMod) / poisonTicks);
    const baseHighTick = Math.round((maxDamage * poisonMod * itemMod) / poisonTicks);

    const baseLowTotal = baseLowTick * poisonTicks;
    const baseHighTotal = baseHighTick * poisonTicks;

    // =========================
    // FULL VARIANCE BOUNDS (NO RNG)
    // =========================

    // LOWEST POSSIBLE HIT
    const minVarLow = minDamage * poisonMod * itemMod * (1 - variance);
    const minVarHigh = maxDamage * poisonMod * itemMod * (1 - variance);

    const varLowTick = Math.floor(minVarLow / poisonTicks);
    const varLowTickHigh = Math.floor(minVarHigh / poisonTicks);

    // HIGHEST POSSIBLE HIT
    const maxVarLow = minDamage * poisonMod * itemMod * (1 + variance);
    const maxVarHigh = maxDamage * poisonMod * itemMod * (1 + variance);

    const varHighTick = Math.ceil(maxVarLow / poisonTicks);
    const varHighTickHigh = Math.ceil(maxVarHigh / poisonTicks);

    // TRUE GLOBAL MIN/MAX
    const finalMinTick = Math.min(varLowTick, varLowTickHigh);
    const finalMaxTick = Math.max(varHighTick, varHighTickHigh);

    const finalMinTotal = finalMinTick * poisonTicks;
    const finalMaxTotal = finalMaxTick * poisonTicks;

    document.getElementById("result").innerText =
        `Poison: ${(poisonMod * 100).toFixed(1)}% | ` +
        `Item Bonus: ${itemPercent.toFixed(1)}%\n\n` +

        `BASE RANGE (no variance):\n` +
        `${baseLowTick} - ${baseHighTick} per tick\n` +
        `${baseLowTotal} - ${baseHighTotal} total\n\n` +

        `FULL VARIANCE RANGE (true possible bounds):\n` +
        `Tick: ${finalMinTick} - ${finalMaxTick}\n` +
        `Total: ${finalMinTotal} - ${finalMaxTotal}`;
}
</script>


</body>
</html>
