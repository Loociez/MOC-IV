<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fighter AI Builder</title>

<style>
body {
  font-family: Arial;
  background: #0e0e14;
  color: white;
  padding: 20px;
}

.container {
  max-width: 800px;
  margin: auto;
  background: #1a1a24;
  padding: 20px;
  border-radius: 10px;
  border: 1px solid #333;
}

h1 { text-align: center; }

label {
  display: block;
  margin-top: 10px;
  color: #bbb;
  font-size: 14px;
}

input, select {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
  background: #111;
  color: white;
  border: 1px solid #333;
  border-radius: 5px;
}

.slider {
  width: 100%;
}

.abilities {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 10px;
}

.ability {
  background: #111;
  padding: 8px;
  border-radius: 5px;
  border: 1px solid #333;
}

button {
  margin-top: 15px;
  width: 100%;
  padding: 10px;
  background: #6c5ce7;
  border: none;
  color: white;
  font-weight: bold;
  border-radius: 6px;
  cursor: pointer;
}

button:hover { background: #5a4bd6; }

pre {
  margin-top: 15px;
  background: #0b0b10;
  padding: 10px;
  border-radius: 6px;
  overflow-x: auto;
  font-size: 12px;
}
</style>
</head>

<body>

<h1>⚔️ AI Fighter Builder (Abilities Edition)</h1>

<div class="container">

  <label>AI Name</label>
  <input id="aiName" value="Custom Fighter AI" />

  <label>Style</label>
  <select id="style">
    <option value="aggressive">Aggressive</option>
    <option value="tactical">Tactical</option>
    <option value="defensive">Defensive</option>
    <option value="adaptive">Adaptive</option>
  </select>

  <label>Aggression</label>
  <input type="range" id="aggression" min="0" max="100" value="60" class="slider">

  <label>Defense</label>
  <input type="range" id="defense" min="0" max="100" value="40" class="slider">

  <label>Preferred Range</label>
  <input type="range" id="rangePref" min="0" max="100" value="50" class="slider">

  <label>Abilities (select multiple)</label>
  <div class="abilities">

    <label class="ability"><input type="checkbox" value="attack"> Attack</label>
    <label class="ability"><input type="checkbox" value="shoot"> Shoot</label>
    <label class="ability"><input type="checkbox" value="dash"> Dash</label>
    <label class="ability"><input type="checkbox" value="block"> Block</label>
    <label class="ability"><input type="checkbox" value="jump"> Jump</label>

    <label class="ability"><input type="checkbox" value="teleport"> Teleport</label>
    <label class="ability"><input type="checkbox" value="groundSlam"> Ground Slam</label>
    <label class="ability"><input type="checkbox" value="healPulse"> Heal Pulse</label>
    <label class="ability"><input type="checkbox" value="shield"> Shield</label>
    <label class="ability"><input type="checkbox" value="energyWave"> Energy Wave</label>
    <label class="ability"><input type="checkbox" value="special"> Special</label>

  </div>

  <button onclick="generate()">Generate AI</button>
  <button onclick="download()">Download .js</button>

  <pre id="output">// output will appear here</pre>
</div>

<script>
let generated = "";

/* collect abilities */
function getAbilities() {
  return [...document.querySelectorAll("input[type=checkbox]:checked")]
    .map(x => x.value);
}

/* generate AI logic with ability filtering */
function buildLogic(abilities, a, d, r) {

  const has = (ab) => abilities.includes(ab);

  return `
export default function(self, opponent, bounds) {

  const dist = opponent.x - self.x;
  const abs = Math.abs(dist);

  const lowHp = self.hp < self.maxHp * 0.35;

  if (self.hitstun > 0 || self.action === 'hurt') return 'idle';

  if (self.x < bounds.left) return 'moveRight';
  if (self.x > bounds.right) return 'moveLeft';

  // =========================
  // CLOSE RANGE
  // =========================
  if (abs < 80) {

    if (${has("attack")}) {
      if (self.cooldown === 0 && Math.random() < ${a/100}) return 'attack';
    }

    if (${has("groundSlam")}) {
      if (self.cooldown === 0 && Math.random() < 0.3) return 'groundSlam';
    }

    if (${has("dash")}) return 'dash';

    if (${has("block")}) return 'block';

    return 'moveLeft';
  }

  // =========================
  // MID RANGE
  // =========================
  if (abs < 180) {

    if (${has("shoot")}) {
      if (self.cooldown === 0 && Math.random() < 0.5) return 'shoot';
    }

    if (${has("energyWave")}) {
      if (self.cooldown === 0 && Math.random() < 0.4) return 'energyWave';
    }

    if (${has("teleport")}) {
      if (Math.random() < 0.2) return 'teleport';
    }

    return dist > 0 ? 'moveRight' : 'moveLeft';
  }

  // =========================
  // LONG RANGE
  // =========================
  if (abs >= 180) {

    if (${has("dash")}) {
      if (self.cooldown === 0 && Math.random() < 0.4) return 'dash';
    }

    if (${has("special")}) {
      if (self.cooldown === 0 && Math.random() < 0.25) return 'special';
    }

    return dist > 0 ? 'moveRight' : 'moveLeft';
  }

  return 'idle';
}
`;
}

function generate() {
  const name = document.getElementById("aiName").value;
  const style = document.getElementById("style").value;

  const a = +document.getElementById("aggression").value;
  const d = +document.getElementById("defense").value;
  const r = +document.getElementById("rangePref").value;

  const abilities = getAbilities();

  generated = `
export const name = "${name}";

${buildLogic(abilities, a, d, r)}
`;

  document.getElementById("output").textContent = generated;
}

function download() {
  if (!generated) generate();

  const blob = new Blob([generated], { type: "text/javascript" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "customAI.js";
  a.click();

  URL.revokeObjectURL(url);
}
</script>

</body>
</html>
