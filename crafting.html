<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MoC Craft Tree Planner</title>

<style>
:root{
  --bg1:#3a0a5c;
  --bg2:#140020;
  --accent:#7a1fd1;
  --accent2:#3e0c66;
  --text:#f5d97b;
}

body{
margin:0;
font-family:"Segoe UI",Arial,sans-serif;
color:var(--text);
background:radial-gradient(circle at 30% 30%, var(--bg1), var(--bg2) 70%);
}

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%, rgba(255,255,255,0.05), transparent 40%),
radial-gradient(circle at 80% 30%, rgba(255,255,255,0.04), transparent 45%),
radial-gradient(circle at 40% 80%, rgba(255,255,255,0.06), transparent 40%);
filter:blur(60px);
animation:smokeMove 30s infinite alternate ease-in-out;
pointer-events:none;
z-index:-1;
}

@keyframes smokeMove{
0%{transform:translateY(0)}
50%{transform:translateY(-40px)}
100%{transform:translateY(20px)}
}

h1{
text-align:center;
margin:30px 0;
}

.controls{
width:95%;
margin:auto;
background:rgba(20,0,40,.65);
border-radius:14px;
padding:14px;
text-align:center;
}

select,input{
background:rgba(0,0,0,.4);
color:var(--text);
border:1px solid rgba(255,215,0,.4);
border-radius:6px;
padding:6px;
margin:6px;
}

button{
background:var(--accent2);
border:1px solid rgba(255,215,0,.4);
color:var(--text);
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

table{
width:95%;
margin:25px auto;
border-collapse:separate;
border-spacing:0;
background:rgba(10,0,25,.7);
border-radius:14px;
overflow:hidden;
}

thead{
background:linear-gradient(90deg,var(--accent),var(--accent2));
}

th,td{
padding:10px;
border-bottom:1px solid rgba(255,255,255,.08);
}

.item{
display:flex;
align-items:center;
gap:8px;
}

.sprite{
width:32px;
height:32px;
image-rendering:pixelated;
background-repeat:no-repeat;
}
</style>
</head>

<body>

<h1>Mirage Online Classic Craft Tree Planner</h1>

<div class="controls">

<label>Recipe:</label>
<select id="recipeSelect"></select>

<label>Qty:</label>
<input type="number" id="recipeQty" value="1" min="1">

<button onclick="addRecipe()">Add Recipe</button>
<button onclick="calculate()">Calculate</button>
<button onclick="shareBuild()">Share Build</button>
<button onclick="clearPlanner()">Clear</button>

</div>

<table>
<thead>
<tr>
<th>Queued Recipes</th>
</tr>
</thead>
<tbody id="recipeQueue"></tbody>
</table>

<table>
<thead>
<tr>
<th>Material</th>
<th>Total Needed</th>
</tr>
</thead>
<tbody id="totalsTable"></tbody>
</table>

<script>

let itemsData=[]
let itemNames={}
let nameToId={}
let queuedRecipes=[]

/* ---------------------------
CUSTOM MATERIAL RECIPES
--------------------------- */

const materialRecipes={
"Beginner's Axe":{"Wood Billet":1, "Metal Bars":2},
"Spade":{"Metal Bars":60},
"Hunter's Knife":{"Metal Bars":2000},
"Hunter's Machete":{"Metal Bars":5000},
"Hatchet":{"Wood Billet":2, "Metal Bars":10},
"Specialized Edge":{"Wood Billet":6, "Metal Bars":40},
"Double-Bitted Axe":{"Wood Billet":6, "Metal Bars":36},
"Beginner's Pick":{"Wood Billet":1, "Metal Bars":2},
"Mattock":{"Wood Billet":2, "Metal Bars":10},
"Rock Smasher":{"Wood Billet":6, "Metal Bars":40},
"Miner's Pick":{"Wood Billet":6, "Metal Bars":36},
"Metal Bar":{"Ore":10},
"Wood Billet":{"Timber":10},
"Whittled Round":{"Timber":25},
"War Club":{"Whittled Round":15,"Wood Billet":20},
"War Bow":{"String":4,"Wood Billet":20},
"Warshade":{"Whittled Round":75,"Wood Billet":100},
"War Shot":{"String":20,"Wood Billet":100},
"Beginner's Rod":{"Wood Billet":1,"String":1,"Rock":1},
"Fishing Pole":{"Wood Billet":5,"String":5,"Rock":1},
"Crappie-o-matic 5000":{"Wood Billet":10,"String":5,"Rock":5,"Scorpion Extract":1},
"Angler's Reel":{"Wood Billet":15,"String":15,"Rock":1}
}

/* --------------------------- */

async function loadItems(){

const res=await fetch("last.json")
itemsData=await res.json()

itemsData.forEach((item,index)=>{
itemNames[index]=item.name
nameToId[item.name]=index
})

populateRecipes()
loadShared()

}

function populateRecipes(){

const dropdown=document.getElementById("recipeSelect")

/* Normal game recipes */
itemsData.forEach((item,index)=>{
if(item.name && item.name.toLowerCase().includes("recipe")){
const opt=document.createElement("option")
opt.value=index
opt.textContent=item.name
dropdown.appendChild(opt)
}
})

/* Custom material recipes */
Object.keys(materialRecipes).forEach(name=>{
const id=nameToId[name]
if(id !== undefined){
const opt=document.createElement("option")
opt.value=id
opt.textContent=name + " [Crafter]"
dropdown.appendChild(opt)
}
})

}

function getSpriteElement(id){
const item = itemsData[id]
if(typeof item.sprite !== "number") return null

const SPRITE_SIZE = 32
const SPRITES_PER_SHEET = 1024
const spritesPerRow = 32
const sheetIndex = Math.floor(item.sprite / SPRITES_PER_SHEET)
const spriteIndex = item.sprite % SPRITES_PER_SHEET
const x = (spriteIndex % spritesPerRow) * SPRITE_SIZE
const y = Math.floor(spriteIndex / spritesPerRow) * SPRITE_SIZE

const div = document.createElement("div")
div.className="sprite"
div.style.backgroundImage = `url('images/items${sheetIndex}.png')`
div.style.backgroundPosition = `-${x}px -${y}px`

return div
}

function createItemCell(id,text){
const wrapper=document.createElement("div")
wrapper.className="item"

const sprite=getSpriteElement(id)
if(sprite) wrapper.appendChild(sprite)

const span=document.createElement("span")
span.textContent=text
wrapper.appendChild(span)

return wrapper
}

function addRecipe(){
const id=parseInt(recipeSelect.value)
const qty=parseInt(recipeQty.value)||1
queuedRecipes.push({id,qty})
renderQueue()
}

function renderQueue(){
const tbody=document.getElementById("recipeQueue")
tbody.innerHTML=""
queuedRecipes.forEach(r=>{
const tr=document.createElement("tr")
const td=document.createElement("td")
td.appendChild(createItemCell(r.id,itemNames[r.id]+" x"+r.qty))
tr.appendChild(td)
tbody.appendChild(tr)
})
}

function calculate(){
const totals={}
queuedRecipes.forEach(r=>{
expandRecipe(r.id,r.qty,totals)
})
renderTotals(totals)
}

function expandRecipe(id,qty,totals){
const item=itemsData[id]
const name=item.name

/* CHECK CUSTOM MATERIAL RECIPES */
if(materialRecipes[name]){
for(const mat in materialRecipes[name]){
const matId=nameToId[mat]
const amount=materialRecipes[name][mat]
expandRecipe(matId,amount*qty,totals)
}
return
}

/* NORMAL GAME RECIPES */
if(item?.data?.recipe_items){
item.data.recipe_items.forEach(req=>{
if(req.item_id===-1 || req.amount<=0) return
expandRecipe(req.item_id,req.amount*qty,totals)
})
return
}

/* BASE MATERIAL */
totals[id]=(totals[id]||0)+qty
}

function renderTotals(totals){
const tbody=document.getElementById("totalsTable")
tbody.innerHTML=""
Object.entries(totals).forEach(([id,amt])=>{
const tr=document.createElement("tr")
const td1=document.createElement("td")
td1.appendChild(createItemCell(id,itemNames[id]))
const td2=document.createElement("td")
td2.textContent=amt
tr.appendChild(td1)
tr.appendChild(td2)
tbody.appendChild(tr)
})
}

function shareBuild(){
const encoded=btoa(JSON.stringify(queuedRecipes))
const url=location.origin+location.pathname+"#"+encoded
navigator.clipboard.writeText(url)
alert("Build URL copied to clipboard!")
}

function loadShared(){
if(location.hash.length>1){
try{
queuedRecipes=JSON.parse(atob(location.hash.substring(1)))
renderQueue()
}catch{}
}
}

function clearPlanner(){
queuedRecipes=[]
renderQueue()
document.getElementById("totalsTable").innerHTML=""
}

loadItems()

</script>

</body>
</html>
