<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MoC Craft Tree Planner</title>

<style>
:root{
  --bg1:#3a0a5c;
  --bg2:#140020;
  --accent:#7a1fd1;
  --accent2:#3e0c66;
  --text:#f5d97b;
}

body.theme-default{--accent:#7a1fd1;--accent2:#3e0c66;--text:#f5d97b;}
body.theme-dark{--accent:#444;--accent2:#222;--text:#e0e0e0;}
body.theme-light{--accent:#ffd580;--accent2:#ffb347;--text:#222;}
body.theme-ocean{--accent:#4a90e2;--accent2:#1b3a5a;--text:#d7e6f0;}
body.theme-forest{--accent:#4a752c;--accent2:#2b441f;--text:#d6f2c2;}

body{
margin:0;
font-family:"Segoe UI",Arial,sans-serif;
color:var(--text);
background:radial-gradient(circle at 30% 30%, var(--bg1), var(--bg2) 70%);
}

/* smoke */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%, rgba(255,255,255,0.05), transparent 40%),
radial-gradient(circle at 80% 30%, rgba(255,255,255,0.04), transparent 45%),
radial-gradient(circle at 40% 80%, rgba(255,255,255,0.06), transparent 40%);
filter:blur(60px);
animation:smokeMove 30s infinite alternate ease-in-out;
pointer-events:none;
z-index:-1;
}

@keyframes smokeMove{
0%{transform:translateY(0) translateX(0)}
50%{transform:translateY(-40px) translateX(20px)}
100%{transform:translateY(20px) translateX(-30px)}
}

h1{
text-align:center;
margin:30px 0;
text-shadow:0 0 10px rgba(255,215,0,.4);
}

.controls{
width:95%;
margin:auto;
background:rgba(20,0,40,.65);
border:1px solid rgba(255,215,0,.3);
border-radius:14px;
padding:14px;
backdrop-filter:blur(10px);
text-align:center;
}

select,input{
background:rgba(0,0,0,.4);
color:var(--text);
border:1px solid rgba(255,215,0,.4);
border-radius:6px;
padding:6px;
margin:6px;
}

button{
background:var(--accent2);
border:1px solid rgba(255,215,0,.4);
color:var(--text);
padding:6px 10px;
border-radius:6px;
cursor:pointer;
margin:4px;
}

button:hover{background:var(--accent);}

table{
width:95%;
margin:25px auto;
border-collapse:separate;
border-spacing:0;
background:rgba(10,0,25,.7);
border-radius:14px;
overflow:hidden;
}

thead{
background:linear-gradient(90deg,var(--accent),var(--accent2));
}

th,td{
padding:12px;
text-align:left;
border-bottom:1px solid rgba(255,255,255,.08);
}

tbody tr:hover{
background:rgba(255,215,0,.08);
}

.tree{
white-space:pre;
font-family:monospace;
padding:15px;
}
</style>
</head>

<body class="theme-default">

<h1>Mirage Online Classic Craft Tree Planner</h1>

<div class="controls">

<label>Theme:</label>
<select id="themeSelector">
<option value="theme-default">MoC</option>
<option value="theme-dark">Dark</option>
<option value="theme-light">Light</option>
<option value="theme-ocean">Ocean</option>
<option value="theme-forest">Forest</option>
</select>

<br>

<label>Recipe:</label>
<select id="recipeSelect"></select>

<label>Qty:</label>
<input type="number" id="recipeQty" value="1" min="1" style="width:80px;">

<button onclick="addRecipe()">Add Recipe</button>
<button onclick="calculate()">Calculate Materials</button>
<button onclick="clearPlanner()">Clear</button>

</div>

<table>
<thead>
<tr>
<th>Queued Recipes</th>
</tr>
</thead>
<tbody id="recipeQueue"></tbody>
</table>

<table>
<thead>
<tr>
<th>Material</th>
<th>Total Needed</th>
</tr>
</thead>
<tbody id="totalsTable"></tbody>
</table>

<div class="tree" id="craftTree"></div>

<script>

let itemsData=[]
let itemNames={}
let queuedRecipes=[]

async function loadItems(){

const res=await fetch("last.json")
itemsData=await res.json()

itemsData.forEach((item,index)=>{
itemNames[index]=item.name
})

populateRecipes()

}

function populateRecipes(){

const dropdown=document.getElementById("recipeSelect")

itemsData.forEach((item,index)=>{

if(item.name && item.name.toLowerCase().includes("recipe")){

const opt=document.createElement("option")
opt.value=index
opt.textContent=item.name
dropdown.appendChild(opt)

}

})

}

function addRecipe(){

const id=parseInt(document.getElementById("recipeSelect").value)
const qty=parseInt(document.getElementById("recipeQty").value)||1

queuedRecipes.push({id,qty})

renderQueue()

}

function renderQueue(){

const tbody=document.getElementById("recipeQueue")
tbody.innerHTML=""

queuedRecipes.forEach(r=>{

const tr=document.createElement("tr")
const td=document.createElement("td")

td.textContent=itemNames[r.id]+" x"+r.qty

tr.appendChild(td)
tbody.appendChild(tr)

})

}

function calculate(){

const totals={}
let tree=""

queuedRecipes.forEach(r=>{

tree+=itemNames[r.id]+" x"+r.qty+"\\n"

expandRecipe(r.id,r.qty,totals,1)

})

renderTotals(totals)
renderTree()

}

function expandRecipe(id,qty,totals,depth){

const item=itemsData[id]

if(!item?.data?.recipe_items){
addMaterial(id,qty,totals)
return
}

item.data.recipe_items.forEach(req=>{

if(req.item_id===-1||req.amount<=0) return

const total=req.amount*qty

const sub=itemsData[req.item_id]

if(sub?.data?.recipe_items){

expandRecipe(req.item_id,total,totals,depth+1)

}else{

addMaterial(req.item_id,total,totals)

}

})

}

function addMaterial(id,amount,totals){

if(!totals[id]) totals[id]=0
totals[id]+=amount

}

function renderTotals(totals){

const tbody=document.getElementById("totalsTable")
tbody.innerHTML=""

Object.entries(totals).forEach(([id,amt])=>{

const tr=document.createElement("tr")

const td1=document.createElement("td")
td1.textContent=itemNames[id]

const td2=document.createElement("td")
td2.textContent=amt

tr.appendChild(td1)
tr.appendChild(td2)

tbody.appendChild(tr)

})

}

function renderTree(){

const div=document.getElementById("craftTree")

let text="CRAFT TREE\\n\\n"

queuedRecipes.forEach(r=>{

text+=itemNames[r.id]+" x"+r.qty+"\\n"
drawTree(r.id,r.qty,1)

})

div.textContent=text

}

function drawTree(id,qty,depth){

const item=itemsData[id]

if(!item?.data?.recipe_items) return

item.data.recipe_items.forEach(req=>{

if(req.item_id===-1||req.amount<=0) return

})

}

function clearPlanner(){

queuedRecipes=[]
document.getElementById("recipeQueue").innerHTML=""
document.getElementById("totalsTable").innerHTML=""
document.getElementById("craftTree").textContent=""

}

const themeSelector=document.getElementById("themeSelector")

function applyTheme(theme){

document.body.classList.forEach(c=>{
if(c.startsWith("theme-")) document.body.classList.remove(c)
})

document.body.classList.add(theme)

}

themeSelector.addEventListener("change",e=>{
applyTheme(e.target.value)
})

loadItems()

</script>

</body>
</html>
