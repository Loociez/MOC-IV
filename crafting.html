<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MoC Crafting Planner</title>

<style>
:root{
  --bg1:#3a0a5c;
  --bg2:#140020;
  --accent:#7a1fd1;
  --accent2:#3e0c66;
  --text:#f5d97b;
}

body.theme-default{--accent:#7a1fd1;--accent2:#3e0c66;--text:#f5d97b;}
body.theme-dark{--accent:#444;--accent2:#222;--text:#e0e0e0;}
body.theme-light{--accent:#ffd580;--accent2:#ffb347;--text:#222;}
body.theme-ocean{--accent:#4a90e2;--accent2:#1b3a5a;--text:#d7e6f0;}
body.theme-forest{--accent:#4a752c;--accent2:#2b441f;--text:#d6f2c2;}

body{
margin:0;
font-family:"Segoe UI",Arial,sans-serif;
color:var(--text);
background:radial-gradient(circle at 30% 30%, var(--bg1), var(--bg2) 70%);
overflow-x:hidden;
}

/* smoke background */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%, rgba(255,255,255,0.05), transparent 40%),
radial-gradient(circle at 80% 30%, rgba(255,255,255,0.04), transparent 45%),
radial-gradient(circle at 40% 80%, rgba(255,255,255,0.06), transparent 40%);
filter:blur(60px);
animation:smokeMove 30s infinite alternate ease-in-out;
pointer-events:none;
z-index:-1;
}

@keyframes smokeMove{
0%{transform:translateY(0) translateX(0)}
50%{transform:translateY(-40px) translateX(20px)}
100%{transform:translateY(20px) translateX(-30px)}
}

h1{
text-align:center;
margin:30px 0;
text-shadow:0 0 10px rgba(255,215,0,.4);
}

.controls{
width:95%;
margin:auto;
background:rgba(20,0,40,.65);
border:1px solid rgba(255,215,0,.3);
border-radius:14px;
padding:14px;
backdrop-filter:blur(10px);
text-align:center;
}

select,input{
background:rgba(0,0,0,.4);
color:var(--text);
border:1px solid rgba(255,215,0,.4);
border-radius:6px;
padding:6px;
margin:6px;
}

button{
background:var(--accent2);
border:1px solid rgba(255,215,0,.4);
color:var(--text);
padding:6px 10px;
border-radius:6px;
cursor:pointer;
margin:4px;
}

button:hover{background:var(--accent);}

table{
width:95%;
margin:25px auto;
border-collapse:separate;
border-spacing:0;
background:rgba(10,0,25,.7);
border-radius:14px;
overflow:hidden;
}

thead{
background:linear-gradient(90deg,var(--accent),var(--accent2));
}

th,td{
padding:12px;
text-align:left;
border-bottom:1px solid rgba(255,255,255,.08);
}

tbody tr:hover{
background:rgba(255,215,0,.08);
}
</style>
</head>

<body class="theme-default">

<h1>Mirage Online Classic Crafting Planner</h1>

<div class="controls">

<label>Theme:</label>
<select id="themeSelector">
<option value="theme-default">MoC</option>
<option value="theme-dark">Dark</option>
<option value="theme-light">Light</option>
<option value="theme-ocean">Ocean</option>
<option value="theme-forest">Forest</option>
</select>

<br>

<label>Select Recipe:</label>
<select id="recipeSelect"></select>

<label>Craft Quantity:</label>
<input type="number" id="craftQty" value="1" min="1" style="width:80px;">

<button onclick="calculateMaterials()">Calculate</button>
<button onclick="clearTable()">Clear</button>

</div>

<table id="materialsTable">
<thead>
<tr>
<th>Material</th>
<th>Total Required</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

let itemsData = []
let itemNames = {}

async function loadItems(){

const response = await fetch("last.json")
itemsData = await response.json()

itemsData.forEach((item,index)=>{
itemNames[index] = item.name
})

populateRecipes()

}

function populateRecipes(){

const dropdown = document.getElementById("recipeSelect")
dropdown.innerHTML=""

itemsData.forEach((item,index)=>{

if(item.name && item.name.toLowerCase().includes("recipe")){

const option=document.createElement("option")
option.value=index
option.textContent=item.name
dropdown.appendChild(option)

}

})

}

function calculateMaterials(){

const recipeID=document.getElementById("recipeSelect").value
const qty=parseInt(document.getElementById("craftQty").value) || 1

const recipe=itemsData[recipeID]

const table=document.querySelector("#materialsTable tbody")
table.innerHTML=""

if(!recipe.data?.recipe_items) return

recipe.data.recipe_items.forEach(req=>{

if(req.item_id===-1 || req.amount<=0) return

const tr=document.createElement("tr")

const name=itemNames[req.item_id] || ("Item ID "+req.item_id)

const td1=document.createElement("td")
td1.textContent=name

const td2=document.createElement("td")
td2.textContent=req.amount * qty

tr.appendChild(td1)
tr.appendChild(td2)

table.appendChild(tr)

})

}

function clearTable(){
document.querySelector("#materialsTable tbody").innerHTML=""
}

/* theme switching */

const themeSelector=document.getElementById("themeSelector")

function applyTheme(theme){

document.body.classList.forEach(cls=>{
if(cls.startsWith("theme-")) document.body.classList.remove(cls)
})

document.body.classList.add(theme)

}

themeSelector.addEventListener("change",e=>{
applyTheme(e.target.value)
})

loadItems()

</script>

</body>
</html>
