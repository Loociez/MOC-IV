<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mirage Online Classic Leaderboards</title>
  <style>
   :root{
  --bg:#13111d;
  --card:#1f1b2e;
  --card-hover:#29233d;
  --accent:#8b5cf6;
  --accent2:#c084fc;
  --text:#f3f0ff;
  --muted:#b9b2d0;
  --gold:#ffd700;
  --silver:#c0c0c0;
  --bronze:#cd7f32;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:Inter,Segoe UI,sans-serif;
  background:
    radial-gradient(circle at top,#2b1f52 0%,#13111d 45%);
  color:var(--text);
  min-height:100vh;
  padding:130px 25px 40px;
}

h1{
  text-align:center;
  font-size:3rem;
  font-weight:800;
  letter-spacing:2px;
  margin-bottom:10px;
}

#last-updated{
  text-align:center;
  color:var(--muted);
  margin-bottom:30px;
}

nav#menu{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:1000;

  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;

  padding:18px;

  background:rgba(20,18,31,.95);
  backdrop-filter:blur(12px);

  border-bottom:1px solid rgba(255,255,255,.08);
}

nav#menu a{
  text-decoration:none;
  color:var(--muted);
  background:rgba(255,255,255,.05);
  padding:10px 18px;
  border-radius:999px;
  transition:.25s;
  font-weight:600;
}

nav#menu a:hover{
  background:var(--accent);
  color:white;
  transform:translateY(-2px);
}

#leaderboard-container{
  max-width:1600px;
  margin:auto;

  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(420px,1fr));
  gap:30px;
}

.leaderboard{
  background:rgba(31,27,46,.85);

  backdrop-filter:blur(12px);

  border:1px solid rgba(255,255,255,.05);

  border-radius:20px;

  overflow:hidden;

  transition:.3s;
}

.leaderboard:hover{
  transform:translateY(-4px);
  background:var(--card-hover);
}

.leaderboard h2{
  text-align:center;

  padding:20px;

  background:linear-gradient(
    90deg,
    var(--accent),
    var(--accent2)
  );

  color:white;

  font-size:1.2rem;

  letter-spacing:1px;

  text-transform:uppercase;
}

table{
  width:100%;
  border-collapse:collapse;
}

thead{
  background:#151220;
}

th{
  color:var(--accent2);
  padding:14px;
  font-size:.85rem;
  text-transform:uppercase;
}

td{
  padding:12px 14px;
}

tbody tr{
  transition:.2s;
}

tbody tr:nth-child(even){
  background:rgba(255,255,255,.03);
}

tbody tr:hover{
  background:rgba(139,92,246,.20);
}

.gold{
  background:
    linear-gradient(
      90deg,
      rgba(255,215,0,.25),
      rgba(255,215,0,.05)
    ) !important;
}

.silver{
  background:
    linear-gradient(
      90deg,
      rgba(192,192,192,.20),
      rgba(192,192,192,.05)
    ) !important;
}

.bronze{
  background:
    linear-gradient(
      90deg,
      rgba(205,127,50,.20),
      rgba(205,127,50,.05)
    ) !important;
}

.gold td:first-child::before{
  content:"🥇 ";
}

.silver td:first-child::before{
  content:"🥈 ";
}

.bronze td:first-child::before{
  content:"🥉 ";
}

::-webkit-scrollbar{
  width:10px;
}

::-webkit-scrollbar-thumb{
  background:var(--accent);
  border-radius:10px;
}

@media(max-width:768px){

  body{
    padding-top:160px;
  }

  #leaderboard-container{
    grid-template-columns:1fr;
  }

  nav#menu{
    justify-content:flex-start;
    overflow-x:auto;
    flex-wrap:nowrap;
  }

  .leaderboard{
    overflow-x:auto;
  }
}
  </style>
</head>
<body>
  <h1>Mirage Online Classic Leaderboards</h1>
  <div id="last-updated">Loading last updated timestamp...</div>
  <nav id="menu" aria-label="Leaderboard navigation"></nav>
  <div id="leaderboard-container">Loading...</div>

  <script>
    // First fetch the last modified date using a HEAD request
    fetch('https://loociez.github.io/MOC-IV/leaderboard_cache.json', { method: 'HEAD' })
      .then(response => {
        const lastModified = response.headers.get('Last-Modified');
        const lastUpdatedDiv = document.getElementById('last-updated');
        if (lastModified) {
          const date = new Date(lastModified);
          lastUpdatedDiv.textContent = `Last updated: ${date.toLocaleString()}`;
        } else {
          lastUpdatedDiv.textContent = 'Last updated date not available';
        }
      })
      .catch(() => {
        document.getElementById('last-updated').textContent = 'Failed to load last updated date';
      });

    // Then fetch the actual leaderboard JSON and build the tables
    fetch('https://loociez.github.io/MOC-IV/leaderboard_cache.json')
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById('leaderboard-container');
        const menu = document.getElementById('menu');
        container.innerHTML = '';
        menu.innerHTML = '';

        for (const [category, entries] of Object.entries(data)) {
          // We no longer skip last_updated since it doesn't exist or is not relevant
          if (category === 'last_updated') continue;

          const slug = category.toLowerCase().replace(/\s+/g, '-').replace(/_/g, '-').replace(/[^\w-]/g, '');

          const link = document.createElement('a');
          link.href = `#${slug}`;
          link.textContent = category.replace(/_/g, ' ').toUpperCase();
          menu.appendChild(link);

          const section = document.createElement('section');
          section.classList.add('leaderboard');
          section.id = slug;

          const heading = document.createElement('h2');
          heading.textContent = category.replace(/_/g, ' ').toUpperCase();
          section.appendChild(heading);

          const table = document.createElement('table');

          const thead = document.createElement('thead');
          const headerRow = document.createElement('tr');
          const rankTh = document.createElement('th');
          rankTh.textContent = 'Rank';
          headerRow.appendChild(rankTh);

          const keys = Object.keys(entries[0] || {});
          keys.forEach(key => {
            const th = document.createElement('th');
            th.textContent = key;
            headerRow.appendChild(th);
          });
          thead.appendChild(headerRow);
          table.appendChild(thead);

          const tbody = document.createElement('tbody');
          entries.forEach((entry, index) => {
            const tr = document.createElement('tr');
            if (index === 0) tr.classList.add('gold');
            else if (index === 1) tr.classList.add('silver');
            else if (index === 2) tr.classList.add('bronze');

            const rankTd = document.createElement('td');
            rankTd.textContent = index + 1;
            tr.appendChild(rankTd);

            keys.forEach((key, i) => {
              const td = document.createElement('td');
              td.textContent = entry[key];
              td.setAttribute(`data-label-${i + 1}`, key);
              tr.appendChild(td);
            });
            tbody.appendChild(tr);
          });
          table.appendChild(tbody);

          section.appendChild(table);
          container.appendChild(section);
        }
      })
      .catch(err => {
        document.getElementById('leaderboard-container').textContent = 'Failed to load leaderboard data.';
        console.error(err);
      });
  </script>
</body>
</html>
