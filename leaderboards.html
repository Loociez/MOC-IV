
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mirage Online Classic Leaderboards v2</title>
<style>
:root{
--bg:#151222;--sidebar:#211a38;--card:#2c2650;--accent:#8b5cf6;
--accent2:#a78bfa;--text:#ece7ff;--border:#4a3d80;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:Segoe UI,sans-serif}
.layout{display:flex;min-height:100vh}
.sidebar{width:280px;background:var(--sidebar);padding:15px;border-right:1px solid var(--border);position:fixed;top:0;bottom:0;overflow-y:auto}
.main{margin-left:280px;padding:20px;width:calc(100% - 280px)}
h1{font-size:1.3rem;color:var(--accent2);margin:0}
.updated{font-size:.8rem;margin-top:6px;color:#bbb}
.search input{width:100%;padding:10px;border-radius:8px;border:none;margin-top:15px}
.search button{width:100%;margin-top:8px;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer}
.menu{margin-top:15px}
.menu button{display:block;width:100%;padding:10px;text-align:left;background:none;border:none;color:#ddd;border-radius:8px;cursor:pointer}
.menu button:hover,.menu button.active{background:var(--accent)}
.card{background:var(--card);padding:18px;border-radius:12px;margin-bottom:20px}
.hidden{display:none}
.table-wrap{overflow:auto;max-height:70vh}
table{width:100%;border-collapse:collapse}
th{background:var(--accent);padding:10px;text-align:left;position:sticky;top:0}
td{padding:8px;border-bottom:1px solid var(--border)}
.gold{background:#FFD700!important;color:#000}
.silver{background:#C0C0C0!important;color:#000}
.bronze{background:#cd7f32!important;color:#000}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.stat{background:#1b1730;padding:15px;border-radius:10px;text-align:center}
.stat .label{font-size:.8rem;color:#bbb}
.stat .value{font-size:1.1rem;font-weight:bold;color:var(--accent2);margin-top:5px}
@media(max-width:900px){
.sidebar{position:relative;width:100%}
.main{margin-left:0;width:100%}
.layout{display:block}
}
</style>
</head>
<body>
<div class="layout">
<div class="sidebar">
<h1>Mirage Online Classic</h1>
<div id="updated" class="updated">Loading...</div>

<div class="search">
<input id="searchInput" placeholder="Search player...">
<button onclick="searchPlayer()">Search All Boards</button>
<button onclick="clearSearch()">Back To Leaderboard</button>
</div>

<div class="menu" id="menu"></div>
</div>

<div class="main">

<!-- SEARCH NOW APPEARS AT TOP -->
<div id="searchCard" class="card hidden">
<h2>Player Results</h2>
<div class="table-wrap" style="max-height:none">
<table>
<thead>
<tr>
<th>Leaderboard</th>
<th>Rank</th>
<th>Player</th>
<th>Value</th>
</tr>
</thead>
<tbody id="searchBody"></tbody>
</table>
</div>
</div>

<div id="leaderboardCard" class="card">
<h2 id="boardTitle">Loading...</h2>

<!-- SUMMARY STATS INSTEAD OF SCROLLING TO TOP PLAYERS -->
<div class="stats" id="stats"></div>

<div class="table-wrap">
<table>
<thead><tr id="thead"></tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>
</div>

</div>
</div>

<script>
const URL="https://loociez.github.io/MOC-IV/leaderboard_cache.json";
let db={};
let current="";

fetch(URL,{method:"HEAD"}).then(r=>{
 const lm=r.headers.get("Last-Modified");
 if(lm) document.getElementById("updated").textContent="Updated: "+new Date(lm).toLocaleString();
});

fetch(URL)
.then(r=>r.json())
.then(data=>{
 db=data;

 const boards=Object.keys(data).filter(k=>k!=="last_updated");
 const menu=document.getElementById("menu");

 boards.forEach((b,i)=>{
   const btn=document.createElement("button");
   btn.textContent=b.replace(/_/g," ").toUpperCase();
   btn.onclick=()=>showBoard(b);
   menu.appendChild(btn);

   if(i===0){
      btn.classList.add("active");
      current=b;
   }
 });

 showBoard(current);
});

function showBoard(board){
 current=board;

 document.querySelectorAll(".menu button").forEach(b=>{
   b.classList.toggle("active",b.textContent===board.replace(/_/g," ").toUpperCase());
 });

 const rows=db[board]||[];

 document.getElementById("boardTitle").textContent=board.replace(/_/g," ").toUpperCase();

 const stats=document.getElementById("stats");
 stats.innerHTML="";

 if(rows.length){
   const first=rows[0];
   const keys=Object.keys(first);

   const player=first[keys[0]] ?? "Unknown";
   const value=first[keys[1]] ?? "";

   stats.innerHTML=`
   <div class="stat"><div class="label">Top Player</div><div class="value">${player}</div></div>
   <div class="stat"><div class="label">Top Value</div><div class="value">${value}</div></div>
   <div class="stat"><div class="label">Entries</div><div class="value">${rows.length}</div></div>`;
 }

 const keys=[...new Set(rows.flatMap(x=>Object.keys(x)))];
 thead.innerHTML="<th>Rank</th>"+keys.map(k=>`<th>${k}</th>`).join("");
 tbody.innerHTML="";

 rows.forEach((r,i)=>{
   const tr=document.createElement("tr");
   if(i===0) tr.classList.add("gold");
   else if(i===1) tr.classList.add("silver");
   else if(i===2) tr.classList.add("bronze");

   tr.innerHTML="<td><b>#"+(i+1)+"</b></td>"+keys.map(k=>`<td>${r[k]??""}</td>`).join("");
   tbody.appendChild(tr);
 });
}

function searchPlayer(){
 const q=document.getElementById("searchInput").value.trim().toLowerCase();
 if(!q) return;

 document.getElementById("searchCard").classList.remove("hidden");

 const body=document.getElementById("searchBody");
 body.innerHTML="";
 let found=0;

 Object.entries(db).forEach(([board,rows])=>{
   if(board==="last_updated") return;

   rows.forEach((row,index)=>{
      const match=Object.values(row).some(v=>String(v).toLowerCase().includes(q));

      if(match){
        found++;
        const keys=Object.keys(row);

        body.innerHTML += `
        <tr>
          <td>${board.replace(/_/g," ").toUpperCase()}</td>
          <td>#${index+1}</td>
          <td>${row[keys[0]]??""}</td>
          <td>${row[keys[1]]??""}</td>
        </tr>`;
      }
   });
 });

 if(!found){
   body.innerHTML='<tr><td colspan="4">No results found.</td></tr>';
 }

 window.scrollTo({top:0,behavior:"smooth"});
}

function clearSearch(){
 document.getElementById("searchCard").classList.add("hidden");
 document.getElementById("searchInput").value="";
}
</script>
</body>
</html>
