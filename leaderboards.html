<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mirage Online Classic Leaderboards</title>
  <style>
    /* Reset & Base Variables */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    :root {
      --bg-main: #0f0d19;
      --bg-card: #1a162b;
      --bg-nav: #231d3a;
      --primary: #8b5cf6;
      --primary-hover: #a78bfa;
      --text-main: #f3f1fe;
      --text-muted: #a7a2ca;
      --border: #312952;
      --gold: #fbbf24;
      --silver: #94a3b8;
      --bronze: #b45309;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-main);
      color: var(--text-main);
      line-height: 1.5;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Header styling */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    h1 {
      font-size: 2.5rem;
      color: var(--primary-hover);
      text-shadow: 0 0 15px rgba(139, 92, 246, 0.4);
      margin-bottom: 0.5rem;
    }
    #last-updated {
      font-size: 0.95rem;
      color: var(--text-muted);
      font-style: italic;
    }

    /* Interactive Search & Filter Controls */
    .controls {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .search-box {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .search-box label {
      font-weight: 600;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .search-row {
      display: flex;
      gap: 0.5rem;
    }
    .search-row input {
      flex: 1;
      background: var(--bg-main);
      border: 1px solid var(--border);
      padding: 0.75rem 1rem;
      border-radius: 8px;
      color: var(--text-main);
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    .search-row input:focus {
      outline: none;
      border-color: var(--primary);
    }
    .btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover {
      background: var(--primary-hover);
    }
    .btn-secondary {
      background: var(--border);
      color: var(--text-main);
    }
    .btn-secondary:hover {
      background: #3e3468;
    }

    /* Tab-based Navigation */
    .tabs-container {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .tabs-label {
      font-weight: 600;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .tabs {
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      padding-bottom: 0.5rem;
    }
    .tab-btn {
      background: var(--bg-nav);
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 0.6rem 1.2rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .tab-btn:hover {
      color: var(--text-main);
      border-color: var(--primary);
    }
    .tab-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* Views (Leaderboard vs Search Results) */
    .view-panel {
      display: none;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      overflow-x: auto;
    }
    .view-panel.active {
      display: block;
    }
    .panel-title {
      font-size: 1.5rem;
      margin-bottom: 1.25rem;
      color: var(--primary-hover);
      border-bottom: 2px solid var(--border);
      padding-bottom: 0.5rem;
    }

    /* Data Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }
    th, td {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
    }
    th {
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
    }
    tbody tr:hover {
      background: rgba(139, 92, 246, 0.05);
    }
    
    /* Rank badges */
    .rank {
      font-weight: bold;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
    }
    .rank-1 { background: var(--gold); color: #000; }
    .rank-2 { background: var(--silver); color: #000; }
    .rank-3 { background: var(--bronze); color: #fff; }

    /* Responsive adjustments */
    @media (max-width: 768px) {
      body { padding: 1rem 0.5rem; }
      h1 { font-size: 2rem; }
      th, td { padding: 0.75rem 0.5rem; }
      .search-row { flex-direction: column; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Mirage Online Classic Leaderboards</h1>
      <div id="last-updated">Last Updated: Loading...</div>
    </header>

    <!-- Search and Switcher Panel -->
    <section class="controls" aria-label="Leaderboard options">
      <div class="search-box">
        <label for="username-search">Search Player History</label>
        <div class="search-row">
          <input type="text" id="username-search" placeholder="Enter username..." autocomplete="off">
          <button class="btn" id="search-submit">Search Profile</button>
          <button class="btn btn-secondary" id="search-clear" style="display:none;">Clear</button>
        </div>
      </div>

      <div class="tabs-container">
        <span class="tabs-label" id="tabs-nav-label">Select Leaderboard Category</span>
        <nav class="tabs" aria-labelledby="tabs-nav-label" id="board-tabs">
          <!-- Tabs populated dynamically via JavaScript -->
        </nav>
      </div>
    </section>

    <main>
      <!-- Standard Leaderboard view container -->
      <section id="leaderboard-panel" class="view-panel active" aria-live="polite">
        <h2 class="panel-title" id="current-board-title">Active Board</h2>
        <table>
          <thead>
            <tr>
              <th style="width: 80px;">Rank</th>
              <th>Username</th>
              <th id="stat-column-header">Value</th>
            </tr>
          </thead>
          <tbody id="leaderboard-data">
            <!-- Table data populated dynamically via JavaScript -->
          </tbody>
        </table>
      </section>

      <!-- Global Search Result view container -->
      <section id="search-panel" class="view-panel" aria-live="polite">
        <h2 class="panel-title" id="search-profile-title">Player Performance Cross-Search</h2>
        <table>
          <thead>
            <tr>
              <th>Leaderboard Type</th>
              <th>Player Rank</th>
              <th>Value Record</th>
            </tr>
          </thead>
          <tbody id="search-data">
            <!-- Search profiles rows populated dynamically via JavaScript -->
          </tbody>
        </table>
      </section>
    </main>
  </div>

  <script>

    const rawDataJson = {

      "boards": {

        "Gold Wealth": [

        ],

    // State Variables
    let activeBoardName = Object.keys(rawDataJson.boards)[0];

    // DOM Elements
    const lastUpdatedEl = document.getElementById('last-updated');
    const boardTabsContainer = document.getElementById('board-tabs');
    const leaderboardPanel = document.getElementById('leaderboard-panel');
    const searchPanel = document.getElementById('search-panel');
    
    const currentBoardTitle = document.getElementById('current-board-title');
    const statColumnHeader = document.getElementById('stat-column-header');
    const leaderboardData = document.getElementById('leaderboard-data');
    
    const usernameSearchInput = document.getElementById('username-search');
    const searchSubmitBtn = document.getElementById('search-submit');
    const searchClearBtn = document.getElementById('search-clear');
    const searchProfileTitle = document.getElementById('search-profile-title');
    const searchDataRows = document.getElementById('search-data');

    // Initialize Layout & Data Insertion
    function initialize() {
      lastUpdatedEl.textContent = `Last Updated: ${rawDataJson.lastUpdated}`;
      renderTabs();
      showLeaderboard(activeBoardName);
      setupEventListeners();
    }

    // Render navigation system tabs dynamically based on data keys
    function renderTabs() {
      boardTabsContainer.innerHTML = '';
      Object.keys(rawDataJson.boards).forEach(boardName => {
        const btn = document.createElement('button');
        btn.className = `tab-btn ${boardName === activeBoardName ? 'active' : ''}`;
        btn.textContent = boardName;
        btn.setAttribute('role', 'tab');
        btn.addEventListener('click', () => {
