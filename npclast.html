<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mirage Online Classic – NPC List</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:radial-gradient(circle at top,#3a0a5c,#140020);
    color:#f5d97b;
}

h1{
    text-align:center;
    padding:20px;
}

.container{
    width:95%;
    margin:auto;
}

.controls{
    margin-bottom:15px;
    text-align:center;
}

input,button{
    padding:8px;
    border-radius:6px;
    border:1px solid #666;
    background:#111;
    color:white;
    margin:5px;
}

button{
    cursor:pointer;
    background:#ffd700;
    color:#2a003f;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
    background:rgba(20,0,40,.75);
}

th,td{
    padding:8px;
    border-bottom:1px solid rgba(255,215,0,.25);
}

th{
    background:#3e0c66;
}

tr:hover{
    background:rgba(255,255,255,0.05);
}

.sprite{
    width:32px;
    height:32px;
    image-rendering:pixelated;
}

.tooltip{
    position:absolute;
    background:#111;
    color:#fff;
    border:1px solid #555;
    padding:6px;
    font-size:12px;
    display:none;
    z-index:100;
}
</style>
</head>

<body>

<h1>Mirage Online Classic – NPC List</h1>

<div class="container">

<div class="controls">
<input id="searchBox" placeholder="Search NPC...">
<button id="itemDropBtn">Item Drop List</button>
</div>

<table id="npcTable">
<thead>
<tr>
<th>Name</th>
<th>Description</th>
<th>Stats</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<div id="tooltip" class="tooltip"></div>

<script>

let npcData=[]
let itemData=[]
let itemIDMap=[]
let filteredData=[]

/* ---------------- LOAD ---------------- */

async function loadData(){

    try{
        const [npcs,items,ids] = await Promise.all([
            fetch("npc.json").then(r=>r.json()),
            fetch("last.json").then(r=>r.json()),
            fetch("itemids.json").then(r=>r.json())
        ])

        npcData=npcs
        itemData=items
        itemIDMap=ids

        filteredData=[...npcData]

        renderTable()

    }catch(err){
        console.error("Load failed:",err)
    }
}

/* ---------------- RENDER ---------------- */

function renderTable(){

    const tbody=document.querySelector("#npcTable tbody")
    tbody.innerHTML=""

    filteredData.forEach(npc=>{

        const row=document.createElement("tr")

        row.appendChild(buildNameCell(npc))
        row.appendChild(buildDescCell(npc))
        row.appendChild(buildStatsCell(npc))

        tbody.appendChild(row)

    })
}

/* ---------------- CELLS ---------------- */

function buildNameCell(npc){

    const td=document.createElement("td")

    const name=document.createElement("div")
    name.textContent=npc.name

    td.appendChild(name)

    if(typeof npc.sprite==="number"){
        td.appendChild(buildSprite(npc))
    }

    return td
}

function buildDescCell(npc){

    const td=document.createElement("td")
    td.textContent=npc.desc || "—"
    return td
}

function buildStatsCell(npc){

    const td=document.createElement("td")

    let lines=[]

    if(npc.stats){
        for(const [k,v] of Object.entries(npc.stats)){
            lines.push(`${k}: ${v}`)
        }
    }

    if(npc.vitals?.hp) lines.push(`HP: ${npc.vitals.hp}`)
    if(npc.vitals?.mp) lines.push(`MP: ${npc.vitals.mp}`)
    if(npc.vitals?.sp) lines.push(`SP: ${npc.vitals.sp}`)

    if(npc.sight_range!==undefined) lines.push(`Sight: ${npc.sight_range}`)
    if(npc.spawn_delay!==undefined) lines.push(`Respawn: ${npc.spawn_delay}`)
    if(npc.spawn_day!==undefined) lines.push(`Day Spawn: ${npc.spawn_day ? "Yes":"No"}`)
    if(npc.spawn_night!==undefined) lines.push(`Night Spawn: ${npc.spawn_night ? "Yes":"No"}`)

    td.textContent = lines.join("\n")
    td.style.whiteSpace="pre-line"

    return td
}

/* ---------------- SPRITES ---------------- */

function buildSprite(npc){

    const SPRITE_SIZE=32
    const FRAMES=12
    const SHEET_SIZE=1024
    const PER_ROW=32

    const start=npc.sprite*FRAMES
    const sheet=Math.floor(start/SHEET_SIZE)
    const frame=start%SHEET_SIZE

    const x=(frame%PER_ROW)*SPRITE_SIZE
    const y=Math.floor(frame/PER_ROW)*SPRITE_SIZE

    const div=document.createElement("div")
    div.className="sprite"

    div.style.backgroundImage=`url(images/sprites${sheet}.png)`
    div.style.backgroundPosition=`-${x}px -${y}px`

    let f=0,interval

    div.onmouseenter=()=>{
        interval=setInterval(()=>{
            const idx=start+f
            const fx=(idx%PER_ROW)*SPRITE_SIZE
            const fy=Math.floor(idx/PER_ROW)*SPRITE_SIZE
            div.style.backgroundPosition=`-${fx}px -${fy}px`
            f=(f+1)%FRAMES
        },100)

        showTooltip(npc,div)
    }

    div.onmouseleave=()=>{
        clearInterval(interval)
        f=0
        div.style.backgroundPosition=`-${x}px -${y}px`
        hideTooltip()
    }

    return div
}

/* ---------------- TOOLTIP ---------------- */

function showTooltip(npc,el){

    if(!npc.drop_items?.length) return

    const tooltip=document.getElementById("tooltip")

    tooltip.innerHTML = npc.drop_items
        .map(d=>{
            const name=itemIDMap[d.item_id]
            if(!name || name==="(not dropped)") return null
            return `${name} x${d.amount} (${d.chance}%)`
        })
        .filter(Boolean)
        .join("<br>")

    const rect=el.getBoundingClientRect()

    tooltip.style.left = rect.right + 5 + "px"
    tooltip.style.top = rect.top + window.scrollY + "px"
    tooltip.style.display="block"
}

function hideTooltip(){
    document.getElementById("tooltip").style.display="none"
}

/* ---------------- SEARCH ---------------- */

document.getElementById("searchBox").addEventListener("input",()=>{

    const term=document.getElementById("searchBox").value.toLowerCase()

    filteredData = npcData.filter(n=>
        n.name.toLowerCase().includes(term) ||
        (n.desc && n.desc.toLowerCase().includes(term))
    )

    renderTable()
})

/* ---------------- INIT ---------------- */

loadData()

</script>

</body>
</html>
