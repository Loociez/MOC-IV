<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MOC Gold Calculator</title>

<style>
:root{
  --bg1:#3a0a5c;
  --bg2:#140020;
  --accent:#7a1fd1;
  --accent2:#3e0c66;
  --text:#f5d97b;
}

body.theme-default{--accent:#7a1fd1;--accent2:#3e0c66;--text:#f5d97b;}
body.theme-dark{--accent:#444;--accent2:#222;--text:#e0e0e0;}
body.theme-light{--accent:#ffd580;--accent2:#ffb347;--text:#222;}
body.theme-ocean{--accent:#4a90e2;--accent2:#1b3a5a;--text:#d7e6f0;}
body.theme-forest{--accent:#4a752c;--accent2:#2b441f;--text:#d6f2c2;}

body{
  margin:0;
  font-family:"Segoe UI",Arial,sans-serif;
  color:var(--text);
  background:radial-gradient(circle at 30% 30%, var(--bg1), var(--bg2) 70%);
  min-height:100vh;
  overflow-x:hidden;
  padding:20px;
}

/* subtle smoke effect */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
  radial-gradient(circle at 20% 20%, rgba(255,255,255,0.05), transparent 40%),
  radial-gradient(circle at 80% 30%, rgba(255,255,255,0.04), transparent 45%),
  radial-gradient(circle at 40% 80%, rgba(255,255,255,0.06), transparent 40%);
  filter:blur(60px);
  animation:smokeMove 30s infinite alternate ease-in-out;
  pointer-events:none;
  z-index:-1;
}
@keyframes smokeMove{
0%{transform:translateY(0)}
50%{transform:translateY(-40px)}
100%{transform:translateY(20px)}
}

h1{
  text-align:center;
  margin:30px 0;
  text-shadow:0 0 10px rgba(255,215,0,.4);
}

.notice{
  background:rgba(20,0,40,.7);
  border:1px solid rgba(255,215,0,.3);
  border-left:4px solid var(--accent);
  border-radius:12px;
  padding:15px;
  width:95%;
  margin:0 auto 20px auto;
  text-align:center;
  backdrop-filter:blur(10px);
}

input{
  background:rgba(0,0,0,.4);
  color:var(--text);
  border:1px solid rgba(255,215,0,.4);
  border-radius:6px;
  padding:8px;
  margin-bottom:15px;
  width:300px;
  display:block;
  margin-left:auto;
  margin-right:auto;
}

table{
  border-collapse:collapse;
  width:95%;
  margin:0 auto 20px auto;
  background:rgba(20,0,40,.7);
  border-radius:12px;
  overflow:hidden;
  backdrop-filter:blur(10px);
}

th, td{
  padding:10px;
  text-align:left;
  border-bottom:1px solid rgba(255,215,0,.2);
}

th{
  background:rgba(0,0,0,.4);
  cursor:pointer;
  user-select:none;
  position:relative;
}

th:hover{
  background:var(--accent2);
}

tr:nth-child(even){
  background:rgba(0,0,0,.3);
}

tr:hover{
  background:rgba(255,255,255,.05);
}

.sort-indicator{
  margin-left:5px;
  font-size:12px;
}

.elite{
  color:#FF6B6B;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>Mirage Online Classic - Gold Calculator</h1>

<div class="notice">
  <strong>Note:</strong> Estimated gold values are approximate. Weak mobs may be off by ±1 gold (~20–25%), elite/boss mobs (☠) may vary slightly more. Use as a general guide.
</div>

<input type="text" id="search" placeholder="Search NPC...">

<table id="npcTable">
  <thead>
    <tr>
      <th data-key="name">Name</th>
      <th data-key="hp">HP</th>
      <th data-key="atk">ATK</th>
      <th data-key="def">DEF</th>
      <th data-key="gold">Estimated Gold</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
let npcData = [];
let currentSort = { key: null, asc: true };

function calculateGold(npc) {
  const hp = npc.vitals?.hp || 0;
  const atk = npc.stats?.atk || 0;
  const def = npc.stats?.def || 0;

  let power = hp + atk * 2 + def * 2;

  if (npc.tag && npc.tag.includes("☠")) {
    power *= 1.25;
  }

  return Math.floor(power / 185);
}

async function loadNPCs() {
  const res = await fetch('./npc.json');
  const data = await res.json();

  npcData = data.map(npc => ({
    name: npc.name,
    hp: npc.vitals?.hp || 0,
    atk: npc.stats?.atk || 0,
    def: npc.stats?.def || 0,
    gold: calculateGold(npc),
    elite: npc.tag && npc.tag.includes("☠")
  }));

  renderTable(npcData);
}

function renderTable(data) {
  const tbody = document.querySelector('#npcTable tbody');
  tbody.innerHTML = '';

  data.forEach(npc => {
    const row = document.createElement('tr');
    row.innerHTML = `
      <td class="${npc.elite ? 'elite' : ''}">${npc.name}${npc.elite ? ' ☠' : ''}</td>
      <td>${npc.hp}</td>
      <td>${npc.atk}</td>
      <td>${npc.def}</td>
      <td>${npc.gold}</td>
    `;
    tbody.appendChild(row);
  });
}

function sortTable(key) {
  const asc = currentSort.key === key ? !currentSort.asc : true;
  currentSort = { key, asc };

  npcData.sort((a, b) => {
    if (typeof a[key] === 'string') {
      return asc
        ? a[key].localeCompare(b[key])
        : b[key].localeCompare(a[key]);
    }
    return asc ? a[key] - b[key] : b[key] - a[key];
  });

  renderTable(npcData);
}

function setupSorting() {
  document.querySelectorAll('th').forEach(th => {
    th.addEventListener('click', () => {
      sortTable(th.dataset.key);
    });
  });
}

function setupSearch() {
  const input = document.getElementById('search');
  input.addEventListener('input', () => {
    const value = input.value.toLowerCase();
    const filtered = npcData.filter(npc =>
      npc.name.toLowerCase().includes(value)
    );
    renderTable(filtered);
  });
}

loadNPCs();
setupSorting();
setupSearch();
</script>

</body>
</html>
