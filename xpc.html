<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mirage Online Classic – NPC XP Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:radial-gradient(circle at top,#3a0a5c,#140020);
    color:#f5d97b;
}
h1{text-align:center;padding:20px;}
.container{width:95%;margin:auto;}
.controls{margin-bottom:15px;}
input{
    padding:6px;
    border-radius:6px;
    border:1px solid #666;
    background:#111;
    color:white;
    width:120px;
    margin-right:10px;
}
table{
    width:100%;
    border-collapse:collapse;
    background:rgba(20,0,40,.75);
    backdrop-filter:blur(10px);
}
th,td{
    padding:8px;
    border-bottom:1px solid rgba(255,215,0,.25);
    cursor:pointer;
}
th{background:#3e0c66;user-select:none;}
tr:hover{background:rgba(255,255,255,0.05);}
.sort-asc::after{content:" ▲";}
.sort-desc::after{content:" ▼";}
</style>
</head>

<body>

<h1>Mirage Online Classic – NPC XP Calculator</h1>

<div class="container">
<div class="controls">
Player Level:
<input id="playerLevel" type="number" value="1" min="1">

Server Boost (%):
<input id="serverBoost" type="number" value="0" min="0">

Search NPC:
<input id="searchBox" placeholder="Type NPC name...">
</div>

<table id="npcTable">
<thead>
<tr>
<th data-key="name">NPC</th>
<th data-key="hp">HP</th>
<th data-key="atk">ATK</th>
<th data-key="def">DEF</th>
<th data-key="rat">RAT</th>
<th data-key="rdf">RDF</th>
<th data-key="mat">MAT</th>
<th data-key="mdf">MDF</th>
<th data-key="baseXP">Base XP</th>
<th data-key="boostedXP">Boosted XP</th>
<th data-key="scaledXP">Scaled XP</th>
<th data-key="xpPerHp">XP / HP</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>
const levelPenalty = 0.018;
const MAX_ITEM_DROPS = 10;

let npcData = [];
let itemData = [];
let filteredData = [];
let currentSort = {key:null,asc:true};

// Calculate NPC stat including equipment
function calcNPCStat(npc, stat){
    let base = npc.stats?.[stat] || 0;

    if(npc.equip_drops && npc.drop_items){
        for(let i=0;i<Math.min(npc.drop_items.length, MAX_ITEM_DROPS);i++){
            const drop = npc.drop_items[i];
            if(!drop) continue;
            const item = itemData[drop.item_id];
            if(!item || !item.data) continue;
            const maxKey = "max_"+stat;
            const minKey = "min_"+stat;
            if(maxKey in item.data) base += Math.floor(item.data[maxKey]);
            if(minKey in item.data) base += Math.floor(item.data[minKey]);
        }
    }

    return Math.max(1, Math.floor(base));
}

// Calculate base XP (before boosts)
function calcNPCBaseXP(npc){
    const physical_damage = calcNPCStat(npc,"atk");
    const ranged_damage = calcNPCStat(npc,"rat");
    const magical_damage = calcNPCStat(npc,"mat");
    const physical_protection = calcNPCStat(npc,"def");
    const ranged_protection = calcNPCStat(npc,"rdf");
    const magical_protection = calcNPCStat(npc,"mdf");

    const max_damage = Math.max(1,physical_damage,ranged_damage,magical_damage);
    const max_protection = Math.max(1,physical_protection,ranged_protection,magical_protection);
    const hp = Math.max(1,npc.vitals?.hp || 1);

    return Math.floor(max_damage) + Math.floor(max_protection) + Math.floor(hp);
}

// Apply server boost correctly (after base XP)
function applyServerBoost(baseXP, boostPercent){
    const multiplier = 1 + (boostPercent/100);
    return Math.floor(baseXP * multiplier);
}

// Scale XP based on player level and NPC level
function scaleXP(boostedXP, playerLevel, npcLevel=83){
    const diff = playerLevel - (npcLevel || 83);
    const modifier = Math.max(0.1, 1 - (diff * levelPenalty));
    return Math.round(boostedXP * modifier);
}

// Render table
function renderTable(){
    const playerLevel = parseInt(document.getElementById("playerLevel").value)||1;
    const serverBoost = parseFloat(document.getElementById("serverBoost").value)||0;
    const tbody = document.querySelector("#npcTable tbody");
    tbody.innerHTML = "";

    filteredData.forEach(npc=>{
        const hp = npc.vitals?.hp || 0;
        const atk = calcNPCStat(npc,"atk");
        const def = calcNPCStat(npc,"def");
        const rat = calcNPCStat(npc,"rat");
        const rdf = calcNPCStat(npc,"rdf");
        const mat = calcNPCStat(npc,"mat");
        const mdf = calcNPCStat(npc,"mdf");

        const baseXP = calcNPCBaseXP(npc);
        const boostedXP = applyServerBoost(baseXP, serverBoost);
        const npcLevel = npc.level || 83;
        const scaledXP = scaleXP(boostedXP, playerLevel, npcLevel);
        const xpPerHp = hp ? (scaledXP/hp).toFixed(2) : 0;

        const row = document.createElement("tr");
        row.innerHTML = `
<td>${npc.name}</td>
<td>${hp}</td>
<td>${atk}</td>
<td>${def}</td>
<td>${rat}</td>
<td>${rdf}</td>
<td>${mat}</td>
<td>${mdf}</td>
<td>${baseXP}</td>
<td>${boostedXP}</td>
<td>${scaledXP}</td>
<td>${xpPerHp}</td>
`;
        tbody.appendChild(row);
    });
}

// Search/filter
let searchTimeout;
function filterData(){
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(()=>{
        const term = document.getElementById("searchBox").value.toLowerCase();
        filteredData = npcData.filter(npc => npc.name.toLowerCase().includes(term));
        applySort();
        renderTable();
    },200);
}

// Sorting
function applySort(key){
    if(key){
        if(currentSort.key === key) currentSort.asc = !currentSort.asc;
        else { currentSort.key = key; currentSort.asc = true; }
    }

    if(currentSort.key){
        const playerLevel = parseInt(document.getElementById("playerLevel").value)||1;
        const serverBoost = parseFloat(document.getElementById("serverBoost").value)||0;

        filteredData.sort((a,b)=>{
            let valA,valB;
            switch(currentSort.key){
                case"name": valA=a.name.toLowerCase(); valB=b.name.toLowerCase(); break;
                case"hp": valA=a.vitals?.hp||0; valB=b.vitals?.hp||0; break;
                case"atk": valA=calcNPCStat(a,"atk"); valB=calcNPCStat(b,"atk"); break;
                case"def": valA=calcNPCStat(a,"def"); valB=calcNPCStat(b,"def"); break;
                case"rat": valA=calcNPCStat(a,"rat"); valB=calcNPCStat(b,"rat"); break;
                case"rdf": valA=calcNPCStat(a,"rdf"); valB=calcNPCStat(b,"rdf"); break;
                case"mat": valA=calcNPCStat(a,"mat"); valB=calcNPCStat(b,"mat"); break;
                case"mdf": valA=calcNPCStat(a,"mdf"); valB=calcNPCStat(b,"mdf"); break;
                case"baseXP": valA=calcNPCBaseXP(a); valB=calcNPCBaseXP(b); break;
                case"boostedXP": valA=applyServerBoost(calcNPCBaseXP(a),serverBoost); valB=applyServerBoost(calcNPCBaseXP(b),serverBoost); break;
                case"scaledXP": valA=scaleXP(applyServerBoost(calcNPCBaseXP(a),serverBoost),playerLevel,a.level);
                                valB=scaleXP(applyServerBoost(calcNPCBaseXP(b),serverBoost),playerLevel,b.level); break;
                case"xpPerHp": valA=scaleXP(applyServerBoost(calcNPCBaseXP(a),serverBoost),playerLevel,a.level)/(a.vitals?.hp||1);
                               valB=scaleXP(applyServerBoost(calcNPCBaseXP(b),serverBoost),playerLevel,b.level)/(b.vitals?.hp||1); break;
                default: valA=0; valB=0;
            }
            if(valA<valB) return currentSort.asc?-1:1;
            if(valA>valB) return currentSort.asc?1:-1;
            return 0;
        });
    }
}

// Event listeners
document.getElementById("playerLevel").addEventListener("input",renderTable);
document.getElementById("serverBoost").addEventListener("input",renderTable);
document.getElementById("searchBox").addEventListener("input",filterData);

document.querySelectorAll("#npcTable th").forEach(th=>{
    th.addEventListener("click",()=>{
        const key=th.dataset.key;
        applySort(key);
        renderTable();
        document.querySelectorAll("#npcTable th").forEach(h=>h.classList.remove("sort-asc","sort-desc"));
        th.classList.add(currentSort.asc?"sort-asc":"sort-desc");
    });
});

// Load JSON
Promise.all([
    fetch("npc.json").then(r=>r.json()),
    fetch("last.json").then(r=>r.json())
]).then(([npcs,items])=>{
    npcData = npcs;
    itemData = items;
    filteredData = [...npcData];
    renderTable();
});
</script>
</body>
</html>
