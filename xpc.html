<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mirage Online Classic – NPC XP Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:radial-gradient(circle at top,#3a0a5c,#140020);
    color:#f5d97b;
}

h1{
    text-align:center;
    padding:20px;
}

.container{
    width:95%;
    margin:auto;
}

.controls{
    margin-bottom:15px;
}

input{
    padding:6px;
    border-radius:6px;
    border:1px solid #666;
    background:#111;
    color:white;
}

table{
    width:100%;
    border-collapse:collapse;
    background:rgba(20,0,40,.75);
    backdrop-filter:blur(10px);
}

th,td{
    padding:8px;
    border-bottom:1px solid rgba(255,215,0,.25);
    cursor:pointer;
}

th{
    background:#3e0c66;
    user-select:none;
}

tr:hover{
    background:rgba(255,255,255,0.05);
}

.sort-asc::after{
    content:" ▲";
}
.sort-desc::after{
    content:" ▼";
}
</style>
</head>

<body>

<h1>Mirage Online Classic – NPC XP Calculator</h1>

<div class="container">

<div class="controls">
Player Level:
<input id="playerLevel" type="number" value="83" min="1">

Search NPC:
<input id="searchBox" placeholder="Type NPC name...">
</div>

<table id="npcTable">

<thead>
<tr>
<th data-key="name">NPC</th>
<th data-key="hp">HP</th>
<th data-key="atk">ATK</th>
<th data-key="def">DEF</th>
<th data-key="rdf">RDF</th>
<th data-key="mdf">MDF</th>
<th data-key="baseXP">Base XP</th>
<th data-key="scaledXP">Scaled XP</th>
<th data-key="xpPerHp">XP / HP</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script>
const npcBuffMultiplier = 1.1; // 10% NPC XP bonus
const levelPenalty = 0.018;

let npcData = [];
let itemData = [];
let filteredData = [];
let currentSort = {key:null,asc:true};

// Calc NPC stat using last.json for equipment if flagged
function calcNPCStat(npc, stat, minmax){
    let base = npc.stats[stat] || 0;

    if(npc.equip_drops && npc.drop_items && itemData.length){
        npc.drop_items.forEach(drop=>{
            if(drop.item_id>=0){
                const item = itemData[drop.item_id];
                if(item && item.data){
                    const minKey = "min_" + stat;
                    const maxKey = "max_" + stat;
                    if(minmax===undefined || minmax){
                        base += item.data[minKey] || 0;
                    }
                    if(minmax===undefined || !minmax){
                        base += item.data[maxKey] || 0;
                    }
                }
            }
        });
    }
    return Math.floor(base);
}

// Calculate base XP exactly per your formula
function calculateBaseXP(npc){
    const maxDmg = Math.max(
        calcNPCStat(npc,"atk",false),
        calcNPCStat(npc,"rat",false),
        calcNPCStat(npc,"mat",false)
    );
    const maxDef = Math.max(
        calcNPCStat(npc,"def",false),
        calcNPCStat(npc,"rdf",false),
        calcNPCStat(npc,"mdf",false)
    );
    const maxHp = Math.max(1, npc.vitals.hp||1);
    return Math.floor(maxDmg + maxDef + maxHp) * npcBuffMultiplier;
}

// Scale XP to player level
function calculateScaledXP(baseXP, playerLevel){
    return Math.round(baseXP * Math.max(0.1, 1 - ((playerLevel-83)*levelPenalty))); // base ref 83
}

// Render table
function renderTable(){
    const playerLevel = parseInt(document.getElementById("playerLevel").value)||83;
    const tbody = document.querySelector("#npcTable tbody");
    tbody.innerHTML = "";

    filteredData.forEach(npc=>{
        const hp = npc.vitals.hp||0;
        const atk = calcNPCStat(npc,"atk",false);
        const def = calcNPCStat(npc,"def",false);
        const rdf = calcNPCStat(npc,"rdf",false);
        const mdf = calcNPCStat(npc,"mdf",false);
        const baseXP = calculateBaseXP(npc);
        const scaledXP = calculateScaledXP(baseXP,playerLevel);
        const xpPerHp = hp ? (scaledXP/hp).toFixed(2) : 0;

        const row = document.createElement("tr");
        row.innerHTML = `
        <td>${npc.name}</td>
        <td>${hp}</td>
        <td>${atk}</td>
        <td>${def}</td>
        <td>${rdf}</td>
        <td>${mdf}</td>
        <td>${baseXP}</td>
        <td>${scaledXP}</td>
        <td>${xpPerHp}</td>
        `;
        tbody.appendChild(row);
    });
}

// Debounced search
let searchTimeout;
function filterData(){
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(()=>{
        const term = document.getElementById("searchBox").value.toLowerCase();
        filteredData = npcData.filter(npc=>npc.name.toLowerCase().includes(term));
        applySort();
        renderTable();
    },200);
}

// Sort columns
function applySort(key){
    if(key){
        if(currentSort.key===key) currentSort.asc=!currentSort.asc;
        else {currentSort.key=key; currentSort.asc=true;}
    }
    if(currentSort.key){
        filteredData.sort((a,b)=>{
            const playerLevel = parseInt(document.getElementById("playerLevel").value)||83;
            const valA = getSortValue(a,currentSort.key,playerLevel);
            const valB = getSortValue(b,currentSort.key,playerLevel);
            return currentSort.asc? (valA>valB?1:valA<valB?-1:0):(valA>valB?-1:valA<valB?1:0);
        });
    }
}

function getSortValue(npc,key,playerLevel){
    switch(key){
        case "name": return npc.name.toLowerCase();
        case "hp": return npc.vitals.hp||0;
        case "atk": return calcNPCStat(npc,"atk",false);
        case "def": return calcNPCStat(npc,"def",false);
        case "rdf": return calcNPCStat(npc,"rdf",false);
        case "mdf": return calcNPCStat(npc,"mdf",false);
        case "baseXP": return calculateBaseXP(npc);
        case "scaledXP": return calculateScaledXP(calculateBaseXP(npc),playerLevel);
        case "xpPerHp": return calculateScaledXP(calculateBaseXP(npc),playerLevel)/(npc.vitals.hp||1);
        default: return 0;
    }
}

/* Events */
document.getElementById("playerLevel").addEventListener("input",renderTable);
document.getElementById("searchBox").addEventListener("input",filterData);

document.querySelectorAll("#npcTable th").forEach(th=>{
    th.addEventListener("click",()=>{
        const key = th.dataset.key;
        applySort(key);
        renderTable();
        document.querySelectorAll("#npcTable th").forEach(h=>h.classList.remove("sort-asc","sort-desc"));
        th.classList.add(currentSort.asc?"sort-asc":"sort-desc");
    });
});

// Load NPCs and item data
Promise.all([
    fetch("npc.json").then(r=>r.json()),
    fetch("last.json").then(r=>r.json())
])
.then(([npcs,items])=>{
    npcData=npcs;
    itemData=items;
    filteredData=[...npcData];
    renderTable();
});
</script>

</body>
</html>
