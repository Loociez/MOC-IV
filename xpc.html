<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mirage Online Classic – NPC XP Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:radial-gradient(circle at top,#3a0a5c,#140020);
    color:#f5d97b;
}

h1{
    text-align:center;
    padding:20px;
}

.container{
    width:95%;
    margin:auto;
}

.controls{
    margin-bottom:15px;
}

input{
    padding:6px;
    border-radius:6px;
    border:1px solid #666;
    background:#111;
    color:white;
}

table{
    width:100%;
    border-collapse:collapse;
    background:rgba(20,0,40,.75);
    backdrop-filter:blur(10px);
}

th,td{
    padding:8px;
    border-bottom:1px solid rgba(255,215,0,.25);
    cursor:pointer;
}

th{
    background:#3e0c66;
    user-select:none;
}

tr:hover{
    background:rgba(255,255,255,0.05);
}

.sprite{
    image-rendering:pixelated;
}

.sort-asc::after{
    content:" ▲";
}
.sort-desc::after{
    content:" ▼";
}
</style>
</head>

<body>

<h1>Mirage Online Classic – NPC XP Calculator</h1>

<div class="container">

<div class="controls">
Player Level:
<input id="playerLevel" type="number" value="83" min="1">

Search NPC:
<input id="searchBox" placeholder="Type NPC name...">
</div>

<table id="npcTable">

<thead>
<tr>
<th data-key="name">NPC</th>
<th data-key="hp">HP</th>
<th data-key="atk">ATK</th>
<th data-key="def">DEF</th>
<th data-key="rdf">RDF</th>
<th data-key="mdf">MDF</th>
<th data-key="baseXP">Base XP</th>
<th data-key="scaledXP">Scaled XP</th>
<th data-key="xpPerHp">XP / HP</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script>
const SPRITE_SIZE = 32;
const SPRITES_PER_SHEET = 1024;
const spritesPerRow = 32;
const levelPenalty = 0.018;
const npcBuffMultiplier = 1.1; // 10% bonus as in your server

let npcData = [];
let filteredData = [];
let currentSort = {key:null,asc:true};

/* --------- STAT CALCULATION FUNCTION --------- */
function calcNPCStat(npc, stat, minmax){
    let min=0,max=0;
    switch(stat){
        case "atk": min=max=npc.stats.atk||0; break;
        case "def": min=max=npc.stats.def||0; break;
        case "rat": min=max=npc.stats.rat||0; break;
        case "rdf": min=max=npc.stats.rdf||0; break;
        case "mat": min=max=npc.stats.mat||0; break;
        case "mdf": min=max=npc.stats.mdf||0; break;
    }
    if(npc.equip_drops){
        if(npc.drop_items){
            npc.drop_items.forEach(drop=>{
                if(drop.item_data){
                    if(minmax===undefined || minmax){
                        min += drop.item_data[`min_${stat}`]||0;
                    }
                    if(minmax===undefined || !minmax){
                        max += drop.item_data[`max_${stat}`]||0;
                    }
                }
            });
        }
    }
    if(minmax===undefined){
        return Math.floor(min); // for simplicity, we can use min
    }
    return minmax? Math.floor(min):Math.floor(max);
}

/* --------- XP CALCULATION --------- */
function calculateBaseXP(npc){
    const maxDmg = Math.max(
        calcNPCStat(npc,"atk",false),
        calcNPCStat(npc,"rat",false),
        calcNPCStat(npc,"mat",false)
    );
    const maxDef = Math.max(
        calcNPCStat(npc,"def",false),
        calcNPCStat(npc,"rdf",false),
        calcNPCStat(npc,"mdf",false)
    );
    const hp = Math.max(1,npc.vitals.hp||1);
    return Math.floor((maxDmg+maxDef+hp)*npcBuffMultiplier);
}

function calculateScaledXP(baseXP,playerLevel){
    // simple scaling: penalize for lower level vs higher level
    const modifier = Math.max(0.1, 1 - ((playerLevel-83)*levelPenalty)); // level 83 as reference
    return Math.round(baseXP*modifier);
}

/* --------- SPRITE RENDERING --------- */
function getSpriteHTML(npc){
    if(typeof npc.sprite!=="number") return "";
    const sheetIndex = Math.floor(npc.sprite/SPRITES_PER_SHEET);
    const spriteIndex = npc.sprite%SPRITES_PER_SHEET;
    const x = (spriteIndex%spritesPerRow)*SPRITE_SIZE;
    const y = Math.floor(spriteIndex/spritesPerRow)*SPRITE_SIZE;
    const bg = `url('images/npcs${sheetIndex}.png')`;
    return `<div class="sprite" style="
        background-image:${bg};
        background-position:-${x}px -${y}px;
        width:${SPRITE_SIZE}px;
        height:${SPRITE_SIZE}px;
        display:inline-block;
        margin-right:6px;"></div>`;
}

/* --------- RENDER TABLE --------- */
function renderTable(){
    const playerLevel = parseInt(document.getElementById("playerLevel").value)||83;
    const tbody = document.querySelector("#npcTable tbody");
    tbody.innerHTML = "";

    filteredData.forEach(npc=>{
        const hp = npc.vitals?.hp||0;
        const atk = calcNPCStat(npc,"atk",false);
        const def = calcNPCStat(npc,"def",false);
        const rdf = calcNPCStat(npc,"rdf",false);
        const mdf = calcNPCStat(npc,"mdf",false);
        const baseXP = calculateBaseXP(npc);
        const scaledXP = calculateScaledXP(baseXP,playerLevel);
        const xpPerHp = hp ? (scaledXP/hp).toFixed(2):0;

        const row = document.createElement("tr");
        row.innerHTML = `
        <td>${getSpriteHTML(npc)}${npc.name}</td>
        <td>${hp}</td>
        <td>${atk}</td>
        <td>${def}</td>
        <td>${rdf}</td>
        <td>${mdf}</td>
        <td>${baseXP}</td>
        <td>${scaledXP}</td>
        <td>${xpPerHp}</td>
        `;
        tbody.appendChild(row);
    });
}

/* --------- SEARCH WITH DEBOUNCE --------- */
let searchTimeout;
function filterData(){
    clearTimeout(searchTimeout);
    searchTimeout=setTimeout(()=>{
        const term = document.getElementById("searchBox").value.toLowerCase();
        filteredData = npcData.filter(npc=>npc.name.toLowerCase().includes(term));
        applySort();
        renderTable();
    },200);
}

/* --------- SORTING --------- */
function applySort(key){
    if(key){
        if(currentSort.key===key) currentSort.asc=!currentSort.asc;
        else {currentSort.key=key; currentSort.asc=true;}
    }
    if(currentSort.key){
        filteredData.sort((a,b)=>{
            const playerLevel = parseInt(document.getElementById("playerLevel").value)||83;
            const valA = currentSort.key==="name"?a.name.toLowerCase():getSortValue(a,currentSort.key,playerLevel);
            const valB = currentSort.key==="name"?b.name.toLowerCase():getSortValue(b,currentSort.key,playerLevel);
            return currentSort.asc? (valA>valB?1:valA<valB?-1:0):(valA>valB?-1:valA<valB?1:0);
        });
    }
}

function getSortValue(npc,key,playerLevel){
    switch(key){
        case "hp": return npc.vitals.hp||0;
        case "atk": return calcNPCStat(npc,"atk",false);
        case "def": return calcNPCStat(npc,"def",false);
        case "rdf": return calcNPCStat(npc,"rdf",false);
        case "mdf": return calcNPCStat(npc,"mdf",false);
        case "baseXP": return calculateBaseXP(npc);
        case "scaledXP": return calculateScaledXP(calculateBaseXP(npc),playerLevel);
        case "xpPerHp": return (calculateScaledXP(calculateBaseXP(npc),playerLevel)/(npc.vitals.hp||1));
        default: return 0;
    }
}

/* --------- EVENTS --------- */
document.getElementById("playerLevel").addEventListener("input",renderTable);
document.getElementById("searchBox").addEventListener("input",filterData);

document.querySelectorAll("#npcTable th").forEach(th=>{
    th.addEventListener("click",()=>{
        const key = th.dataset.key;
        applySort(key);
        renderTable();
        document.querySelectorAll("#npcTable th").forEach(h=>h.classList.remove("sort-asc","sort-desc"));
        th.classList.add(currentSort.asc?"sort-asc":"sort-desc");
    });
});

/* --------- LOAD NPC DATA --------- */
fetch("npc.json")
.then(r=>r.json())
.then(data=>{
    npcData=data;
    filteredData=[...npcData];
    renderTable();
});
</script>

</body>
</html>
