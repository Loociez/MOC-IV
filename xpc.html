<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mirage Online Classic – NPC XP Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:radial-gradient(circle at top,#3a0a5c,#140020);
    color:#f5d97b;
}

h1{
    text-align:center;
    padding:20px;
}

.container{
    width:95%;
    margin:auto;
}

.controls{
    margin-bottom:15px;
}

input{
    padding:6px;
    border-radius:6px;
    border:1px solid #666;
    background:#111;
    color:white;
    margin-right:10px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:rgba(20,0,40,.75);
    backdrop-filter:blur(10px);
}

th,td{
    padding:8px;
    border-bottom:1px solid rgba(255,215,0,.25);
    cursor:pointer;
}

th{
    background:#3e0c66;
    user-select:none;
}

tr:hover{
    background:rgba(255,255,255,0.05);
}

.sort-asc::after{
    content:" ▲";
}
.sort-desc::after{
    content:" ▼";
}
</style>
</head>

<body>

<h1>Mirage Online Classic – NPC XP Calculator</h1>

<div class="container">

<div class="controls">
Player Level:
<input id="playerLevel" type="number" value="83" min="1">

Server Boost %:
<input id="serverBoost" type="number" value="0" min="0">

Search NPC:
<input id="searchBox" placeholder="Type NPC name...">
</div>

<table id="npcTable">
<thead>
<tr>
<th data-key="name">NPC</th>
<th data-key="hp">HP</th>
<th data-key="atk">ATK</th>
<th data-key="def">DEF</th>
<th data-key="rat">RAT</th>
<th data-key="rdf">RDF</th>
<th data-key="mat">MAT</th>
<th data-key="mdf">MDF</th>
<th data-key="baseXP">Base XP</th>
<th data-key="scaledXP">Scaled XP</th>
<th data-key="xpPerHp">XP / HP</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>
// Constants
const npcBuffMultiplier = 1.1;
const levelPenalty = 0.018;
const MAX_ITEM_DROPS = 10;

// Data
let npcData = [];
let itemData = [];
let filteredData = [];
let currentSort = {key:null,asc:true};

// Helper: Simulate calcNPCStat
function calcNPCStat(npc, stat) {
    let min = npc.stats[stat] || 0;
    let max = npc.stats[stat] || 0;

    if(npc.equip_drops && npc.drop_items && itemData.length){
        npc.drop_items.slice(0,MAX_ITEM_DROPS).forEach(drop=>{
            if(drop.item_id>=0){
                const item = itemData[drop.item_id];
                if(item && item.data){
                    const minKey = "min_"+stat;
                    const maxKey = "max_"+stat;
                    min += item.data[minKey]||0;
                    max += item.data[maxKey]||0;
                }
            }
        });
    }

    return Math.max(1, Math.floor(max));
}

// Simulate official calcNPCExperience
function calcNPCExperience(npc) {
    const physical_damage = calcNPCStat(npc,"atk");
    const ranged_damage = calcNPCStat(npc,"rat");
    const magical_damage = calcNPCStat(npc,"mat");
    const physical_protection = calcNPCStat(npc,"def");
    const ranged_protection = calcNPCStat(npc,"rdf");
    const magical_protection = calcNPCStat(npc,"mdf");

    const max_damage = Math.max(1, physical_damage, ranged_damage, magical_damage);
    const max_protection = Math.max(1, physical_protection, ranged_protection, magical_protection);
    const max_hp = Math.max(1, npc.vitals.hp || 1);

    return Math.floor((max_damage + max_protection + max_hp) * npcBuffMultiplier);
}

// Scaled XP by player level
function scaleXP(baseXP, playerLevel, npcLevel=83){
    const levelDiff = playerLevel - npcLevel;
    const modifier = Math.max(0.1, 1 - (levelDiff * levelPenalty));
    return Math.round(baseXP * modifier);
}

// Apply server boost
function applyServerBoost(xp, boostPercent){
    return Math.round(xp + (xp * (boostPercent/100)));
}

// Render table
function renderTable(){
    const playerLevel = parseInt(document.getElementById("playerLevel").value)||83;
    const serverBoost = parseFloat(document.getElementById("serverBoost").value)||0;

    const tbody = document.querySelector("#npcTable tbody");
    tbody.innerHTML = "";

    filteredData.forEach(npc=>{
        const hp = npc.vitals.hp||0;

        const atk = calcNPCStat(npc,"atk");
        const def = calcNPCStat(npc,"def");
        const rat = calcNPCStat(npc,"rat");
        const rdf = calcNPCStat(npc,"rdf");
        const mat = calcNPCStat(npc,"mat");
        const mdf = calcNPCStat(npc,"mdf");

        const baseXP = calcNPCExperience(npc);
        const scaledXP = scaleXP(baseXP,playerLevel);
        const finalXP = applyServerBoost(scaledXP,serverBoost);

        const xpPerHp = hp? (finalXP/hp).toFixed(2):0;

        const row = document.createElement("tr");
        row.innerHTML = `
            <td>${npc.name}</td>
            <td>${hp}</td>
            <td>${atk}</td>
            <td>${def}</td>
            <td>${rat}</td>
            <td>${rdf}</td>
            <td>${mat}</td>
            <td>${mdf}</td>
            <td>${baseXP}</td>
            <td>${finalXP}</td>
            <td>${xpPerHp}</td>
        `;
        tbody.appendChild(row);
    });
}

// Debounced search
let searchTimeout;
function filterData(){
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(()=>{
        const term = document.getElementById("searchBox").value.toLowerCase();
        filteredData = npcData.filter(npc=>npc.name.toLowerCase().includes(term));
        applySort();
        renderTable();
    }, 200);
}

// Sorting
function applySort(key){
    if(key){
        if(currentSort.key===key) currentSort.asc=!currentSort.asc;
        else {currentSort.key=key; currentSort.asc=true;}
    }

    if(currentSort.key){
        const playerLevel = parseInt(document.getElementById("playerLevel").value)||83;
        const serverBoost = parseFloat(document.getElementById("serverBoost").value)||0;

        filteredData.sort((a,b)=>{

            let valA,valB;

            switch(currentSort.key){

                case "name":
                    valA=a.name.toLowerCase();
                    valB=b.name.toLowerCase();
                break;

                case "hp":
                    valA=a.vitals.hp||0;
                    valB=b.vitals.hp||0;
                break;

                case "atk":
                    valA=calcNPCStat(a,"atk");
                    valB=calcNPCStat(b,"atk");
                break;

                case "def":
                    valA=calcNPCStat(a,"def");
                    valB=calcNPCStat(b,"def");
                break;

                case "rat":
                    valA=calcNPCStat(a,"rat");
                    valB=calcNPCStat(b,"rat");
                break;

                case "rdf":
                    valA=calcNPCStat(a,"rdf");
                    valB=calcNPCStat(b,"rdf");
                break;

                case "mat":
                    valA=calcNPCStat(a,"mat");
                    valB=calcNPCStat(b,"mat");
                break;

                case "mdf":
                    valA=calcNPCStat(a,"mdf");
                    valB=calcNPCStat(b,"mdf");
                break;

                case "baseXP":
                    valA=calcNPCExperience(a);
                    valB=calcNPCExperience(b);
                break;

                case "scaledXP":
                    valA=applyServerBoost(scaleXP(calcNPCExperience(a),playerLevel),serverBoost);
                    valB=applyServerBoost(scaleXP(calcNPCExperience(b),playerLevel),serverBoost);
                break;

                case "xpPerHp":
                    valA=applyServerBoost(scaleXP(calcNPCExperience(a),playerLevel),serverBoost)/(a.vitals.hp||1);
                    valB=applyServerBoost(scaleXP(calcNPCExperience(b),playerLevel),serverBoost)/(b.vitals.hp||1);
                break;

                default:
                    valA=0;
                    valB=0;
            }

            if(valA<valB) return currentSort.asc?-1:1;
            if(valA>valB) return currentSort.asc?1:-1;
            return 0;

        });
    }
}

// Event listeners
document.getElementById("playerLevel").addEventListener("input",renderTable);
document.getElementById("serverBoost").addEventListener("input",renderTable);
document.getElementById("searchBox").addEventListener("input",filterData);

document.querySelectorAll("#npcTable th").forEach(th=>{
    th.addEventListener("click",()=>{
        const key = th.dataset.key;
        applySort(key);
        renderTable();

        document.querySelectorAll("#npcTable th")
        .forEach(h=>h.classList.remove("sort-asc","sort-desc"));

        th.classList.add(currentSort.asc?"sort-asc":"sort-desc");
    });
});

// Load JSONs
Promise.all([
    fetch("npc.json").then(r=>r.json()),
    fetch("last.json").then(r=>r.json())
]).then(([npcs,items])=>{
    npcData = npcs;
    itemData = items;
    filteredData = [...npcData];
    renderTable();
});
</script>

</body>
</html>
