<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mirage Online Classic – NPC XP Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:radial-gradient(circle at top,#3a0a5c,#140020);
    color:#f5d97b;
}

h1{
    text-align:center;
    padding:20px;
}

.container{
    width:95%;
    margin:auto;
}

.controls{
    margin-bottom:15px;
}

input{
    padding:6px;
    border-radius:6px;
    border:1px solid #666;
    background:#111;
    color:white;
    margin-right:10px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:rgba(20,0,40,.75);
}

th,td{
    padding:8px;
    border-bottom:1px solid rgba(255,215,0,.25);
}

th{
    background:#3e0c66;
    cursor:pointer;
}

tr:hover{
    background:rgba(255,255,255,0.05);
}

.sort-asc::after{content:" ▲";}
.sort-desc::after{content:" ▼";}
</style>
</head>

<body>

<h1>Mirage Online Classic – NPC XP Calculator</h1>

<div class="container">

<div class="controls">
Server Boost %:
<input id="serverBoost" type="number" value="0">

Search NPC:
<input id="searchBox" placeholder="Type NPC name...">
</div>

<table id="npcTable">
<thead>
<tr>
<th data-key="name">NPC</th>
<th data-key="hp">HP</th>
<th data-key="atk">ATK</th>
<th data-key="def">DEF</th>
<th data-key="rat">RAT</th>
<th data-key="rdf">RDF</th>
<th data-key="mat">MAT</th>
<th data-key="mdf">MDF</th>
<th data-key="baseXP">Base XP</th>
<th data-key="boostXP">XP w/ Boost</th>
<th data-key="xpPerHp">XP / HP</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>

const MAX_ITEM_DROPS = 10;

let npcData = [];
let itemData = [];
let mapsData = [];
let spawnList = [];
let filteredData = [];
let currentSort = {key:null,asc:true};

function calcNPCStat(map_npc,npc,stat){

    let min = map_npc.stats?.[stat] || 0;
    let max = map_npc.stats?.[stat] || 0;

    const minKey = "min_"+stat;
    const maxKey = "max_"+stat;

    if(npc.equip_drops && npc.drop_items){

        for(let i=0;i<MAX_ITEM_DROPS;i++){

            const drop = npc.drop_items[i];
            if(!drop) continue;

            const item = itemData[drop.item_id];
            if(!item || !item.data) continue;

            if(minKey in item.data) min += Math.floor(item.data[minKey]);
            if(maxKey in item.data) max += Math.floor(item.data[maxKey]);
        }
    }

    return Math.floor(max);
}

function calcNPCExperience(map_npc,npc){

    const physical_damage = calcNPCStat(map_npc,npc,"atk");
    const ranged_damage = calcNPCStat(map_npc,npc,"rat");
    const magical_damage = calcNPCStat(map_npc,npc,"mat");

    const physical_protection = calcNPCStat(map_npc,npc,"def");
    const ranged_protection = calcNPCStat(map_npc,npc,"rdf");
    const magical_protection = calcNPCStat(map_npc,npc,"mdf");

    const max_damage = Math.max(1,physical_damage,ranged_damage,magical_damage);
    const max_protection = Math.max(1,physical_protection,ranged_protection,magical_protection);
    const max_hp = Math.max(1,npc.vitals?.hp||1);

    return Math.floor(max_damage + max_protection + max_hp);
}

function applyServerBoost(xp){

    const boost = parseFloat(document.getElementById("serverBoost").value)||0;

    return Math.floor(xp + (xp*boost/100));
}

function buildSpawnList(){

    spawnList=[];

    mapsData.forEach((map,map_id)=>{

        if(!map.map_npcs) return;

        map.map_npcs.forEach((map_npc,slot_id)=>{

            const npc = npcData[map_npc.npc_id];
            if(!npc) return;

            spawnList.push({
                name:npc.name,
                npc:npc,
                map_npc:map_npc,
                map_id:map_id,
                slot_id:slot_id
            });

        });

    });

}

function renderTable(){

    const tbody=document.querySelector("#npcTable tbody");
    tbody.innerHTML="";

    filteredData.forEach(entry=>{

        const npc=entry.npc;
        const map_npc=entry.map_npc;

        const hp=npc.vitals?.hp||0;

        const atk=calcNPCStat(map_npc,npc,"atk");
        const def=calcNPCStat(map_npc,npc,"def");
        const rat=calcNPCStat(map_npc,npc,"rat");
        const rdf=calcNPCStat(map_npc,npc,"rdf");
        const mat=calcNPCStat(map_npc,npc,"mat");
        const mdf=calcNPCStat(map_npc,npc,"mdf");

        const baseXP=calcNPCExperience(map_npc,npc);
        const boostXP=applyServerBoost(baseXP);

        const xpPerHp=hp?(boostXP/hp).toFixed(2):0;

        const row=document.createElement("tr");

        row.innerHTML=`
        <td>${npc.name}</td>
        <td>${hp}</td>
        <td>${atk}</td>
        <td>${def}</td>
        <td>${rat}</td>
        <td>${rdf}</td>
        <td>${mat}</td>
        <td>${mdf}</td>
        <td>${baseXP}</td>
        <td>${boostXP}</td>
        <td>${xpPerHp}</td>
        `;

        tbody.appendChild(row);

    });

}

let searchTimeout;

function filterData(){

    clearTimeout(searchTimeout);

    searchTimeout=setTimeout(()=>{

        const term=document.getElementById("searchBox").value.toLowerCase();

        filteredData=spawnList.filter(e=>e.name.toLowerCase().includes(term));

        applySort();
        renderTable();

    },200);

}

function applySort(key){

    if(key){
        if(currentSort.key===key) currentSort.asc=!currentSort.asc;
        else{currentSort.key=key;currentSort.asc=true;}
    }

    if(!currentSort.key) return;

    filteredData.sort((a,b)=>{

        const npcA=a.npc;
        const npcB=b.npc;

        const mapA=a.map_npc;
        const mapB=b.map_npc;

        let valA,valB;

        switch(currentSort.key){

            case"name":
            valA=npcA.name.toLowerCase();
            valB=npcB.name.toLowerCase();
            break;

            case"hp":
            valA=npcA.vitals?.hp||0;
            valB=npcB.vitals?.hp||0;
            break;

            case"atk":
            valA=calcNPCStat(mapA,npcA,"atk");
            valB=calcNPCStat(mapB,npcB,"atk");
            break;

            case"def":
            valA=calcNPCStat(mapA,npcA,"def");
            valB=calcNPCStat(mapB,npcB,"def");
            break;

            case"rat":
            valA=calcNPCStat(mapA,npcA,"rat");
            valB=calcNPCStat(mapB,npcB,"rat");
            break;

            case"rdf":
            valA=calcNPCStat(mapA,npcA,"rdf");
            valB=calcNPCStat(mapB,npcB,"rdf");
            break;

            case"mat":
            valA=calcNPCStat(mapA,npcA,"mat");
            valB=calcNPCStat(mapB,npcB,"mat");
            break;

            case"mdf":
            valA=calcNPCStat(mapA,npcA,"mdf");
            valB=calcNPCStat(mapB,npcB,"mdf");
            break;

            case"baseXP":
            valA=calcNPCExperience(mapA,npcA);
            valB=calcNPCExperience(mapB,npcB);
            break;

            case"boostXP":
            valA=applyServerBoost(calcNPCExperience(mapA,npcA));
            valB=applyServerBoost(calcNPCExperience(mapB,npcB));
            break;

            case"xpPerHp":
            valA=applyServerBoost(calcNPCExperience(mapA,npcA))/(npcA.vitals?.hp||1);
            valB=applyServerBoost(calcNPCExperience(mapB,npcB))/(npcB.vitals?.hp||1);
            break;
        }

        if(valA<valB) return currentSort.asc?-1:1;
        if(valA>valB) return currentSort.asc?1:-1;
        return 0;

    });

}

document.getElementById("searchBox").addEventListener("input",filterData);
document.getElementById("serverBoost").addEventListener("input",renderTable);

document.querySelectorAll("#npcTable th").forEach(th=>{
    th.addEventListener("click",()=>{
        applySort(th.dataset.key);
        renderTable();

        document.querySelectorAll("#npcTable th")
        .forEach(h=>h.classList.remove("sort-asc","sort-desc"));

        th.classList.add(currentSort.asc?"sort-asc":"sort-desc");
    });
});

Promise.all([
fetch("npc.json").then(r=>r.json()),
fetch("last.json").then(r=>r.json()),
fetch("mapdump.json").then(r=>r.json())
]).then(([npcs,items,maps])=>{

    npcData=npcs;
    itemData=items;
    mapsData=maps;

    buildSpawnList();

    filteredData=[...spawnList];

    renderTable();

});

</script>

</body>
</html>
