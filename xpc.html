<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mirage Online Classic XP Calculator</title>

<style>
body{
    font-family:Arial;
    background:#1b002b;
    color:#ffd86b;
    margin:0;
}

h1{
    text-align:center;
    padding:15px;
}

.container{
    width:95%;
    margin:auto;
}

.controls{
    margin-bottom:15px;
}

input{
    padding:6px;
    border-radius:5px;
    border:1px solid #555;
    background:#111;
    color:white;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#21003a;
}

th,td{
    padding:8px;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

th{
    background:#3a0066;
}

tr:hover{
    background:rgba(255,255,255,0.05);
}
</style>
</head>

<body>

<h1>Mirage Online Classic – NPC XP Calculator</h1>

<div class="container">

<div class="controls">
Server Boost %
<input id="serverBoost" type="number" value="0">

Search NPC
<input id="searchBox">
</div>

<table id="npcTable">
<thead>
<tr>
<th>NPC</th>
<th>HP</th>
<th>ATK</th>
<th>DEF</th>
<th>RAT</th>
<th>RDF</th>
<th>MAT</th>
<th>MDF</th>
<th>Base XP</th>
<th>XP w/ Boost</th>
<th>XP / HP</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>

const MAX_ITEM_DROPS = 10

let npcData=[]
let itemData=[]
let mapsData=[]
let spawnList=[]

function calcNPCStat(map_npc,npc,stat){

    let min = map_npc.stats?.[stat] || 0
    let max = map_npc.stats?.[stat] || 0

    const minKey = "min_"+stat
    const maxKey = "max_"+stat

    if(npc.equip_drops && npc.drop_items){

        for(let i=0;i<MAX_ITEM_DROPS;i++){

            const drop = npc.drop_items[i]
            if(!drop) continue

            const item = itemData[drop.item_id]
            if(!item || !item.data) continue

            if(minKey in item.data) min += Math.floor(item.data[minKey])
            if(maxKey in item.data) max += Math.floor(item.data[maxKey])
        }
    }

    return Math.floor(max)
}

function calcNPCExperience(map_npc,npc){

    const physical_damage = calcNPCStat(map_npc,npc,"atk")
    const ranged_damage = calcNPCStat(map_npc,npc,"rat")
    const magical_damage = calcNPCStat(map_npc,npc,"mat")

    const physical_protection = calcNPCStat(map_npc,npc,"def")
    const ranged_protection = calcNPCStat(map_npc,npc,"rdf")
    const magical_protection = calcNPCStat(map_npc,npc,"mdf")

    const max_damage = Math.max(1,physical_damage,ranged_damage,magical_damage)
    const max_protection = Math.max(1,physical_protection,ranged_protection,magical_protection)
    const max_hp = Math.max(1,npc.vitals?.hp||1)

    return Math.floor(max_damage + max_protection + max_hp)
}

function applyServerBoost(xp){

    const boost=parseFloat(document.getElementById("serverBoost").value)||0
    return Math.floor(xp+(xp*boost/100))
}

function buildSpawnList(){

    spawnList=[]

    mapsData.forEach((map,map_id)=>{

        if(!map.map_npcs) return

        map.map_npcs.forEach((map_npc,slot_id)=>{

            const npc=npcData[map_npc.npc_id]
            if(!npc) return

            spawnList.push({
                name:npc.name,
                npc:npc,
                map_npc:map_npc,
                map_id:map_id,
                slot_id:slot_id
            })

        })

    })

}

function renderTable(){

    const tbody=document.querySelector("#npcTable tbody")
    tbody.innerHTML=""

    spawnList.forEach(entry=>{

        const npc=entry.npc
        const map_npc=entry.map_npc

        const hp=npc.vitals?.hp||0

        const atk=calcNPCStat(map_npc,npc,"atk")
        const def=calcNPCStat(map_npc,npc,"def")
        const rat=calcNPCStat(map_npc,npc,"rat")
        const rdf=calcNPCStat(map_npc,npc,"rdf")
        const mat=calcNPCStat(map_npc,npc,"mat")
        const mdf=calcNPCStat(map_npc,npc,"mdf")

        const baseXP=calcNPCExperience(map_npc,npc)
        const boostXP=applyServerBoost(baseXP)

        const xpPerHp=hp?(boostXP/hp).toFixed(2):0

        const row=document.createElement("tr")

        row.innerHTML=`
        <td>${npc.name}</td>
        <td>${hp}</td>
        <td>${atk}</td>
        <td>${def}</td>
        <td>${rat}</td>
        <td>${rdf}</td>
        <td>${mat}</td>
        <td>${mdf}</td>
        <td>${baseXP}</td>
        <td>${boostXP}</td>
        <td>${xpPerHp}</td>
        `

        tbody.appendChild(row)

    })

}

document.getElementById("searchBox").addEventListener("input",()=>{

    const term=document.getElementById("searchBox").value.toLowerCase()

    const rows=document.querySelectorAll("#npcTable tbody tr")

    rows.forEach(row=>{
        const name=row.children[0].innerText.toLowerCase()
        row.style.display=name.includes(term)?"":"none"
    })

})

document.getElementById("serverBoost").addEventListener("input",renderTable)

async function loadData(){

    try{

        const npcRes = await fetch("npc.json")
        const itemRes = await fetch("last.json")
        const mapRes = await fetch("mapdump.json")

        npcData = await npcRes.json()
        itemData = await itemRes.json()
        mapsData = await mapRes.json()

        console.log("NPCs:",npcData.length)
        console.log("Items:",itemData.length)
        console.log("Maps:",mapsData.length)

        buildSpawnList()

        console.log("Spawns detected:",spawnList.length)

        renderTable()

    }catch(err){

        console.error("Failed loading JSON:",err)

    }

}

loadData()

</script>

</body>
</html>
