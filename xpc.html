<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mirage Online Classic – NPC XP Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:radial-gradient(circle at top,#3a0a5c,#140020);
    color:#f5d97b;
}

h1{
    text-align:center;
    padding:20px;
}

.container{
    width:95%;
    margin:auto;
}

.controls{
    margin-bottom:15px;
}

input{
    padding:6px;
    border-radius:6px;
    border:1px solid #666;
    background:#111;
    color:white;
}

table{
    width:100%;
    border-collapse:collapse;
    background:rgba(20,0,40,.75);
    backdrop-filter:blur(10px);
}

th,td{
    padding:8px;
    border-bottom:1px solid rgba(255,215,0,.25);
}

th{
    background:#3e0c66;
}

tr:hover{
    background:rgba(255,255,255,0.05);
}

.sprite{
    image-rendering:pixelated;
}

</style>
</head>

<body>

<h1>Mirage Online Classic – NPC XP Calculator</h1>

<div class="container">

<div class="controls">
Player Level:
<input id="playerLevel" type="number" value="83">

Search NPC:
<input id="searchBox" placeholder="Type NPC name...">
</div>

<table id="npcTable">

<thead>
<tr>
<th>NPC</th>
<th>HP</th>
<th>ATK</th>
<th>DEF</th>
<th>RDF</th>
<th>MDF</th>
<th>Est NPC Level</th>
<th>Base XP</th>
<th>Scaled XP</th>
<th>XP / HP</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script>

// sprite constants
const SPRITE_SIZE = 32;
const SPRITES_PER_SHEET = 1024;
const spritesPerRow = 32;

// xp formula multiplier derived earlier
const difficultyMultiplier = 0.95;

// level scaling factor derived earlier (~1.8%)
const levelPenalty = 0.018;

let npcData = [];

// estimate npc level from combat stats
function estimateNPCLevel(totalStats){
    return Math.round(totalStats / 10);
}

// calculate base xp
function calculateBaseXP(npc){

    const hp = npc.vitals?.hp || 0;
    const atk = npc.stats?.atk || 0;
    const def = npc.stats?.def || 0;
    const rdf = npc.stats?.rdf || 0;
    const mdf = npc.stats?.mdf || 0;

    const totalStats = hp + atk + def + rdf + mdf;

    return Math.round(totalStats * difficultyMultiplier);
}

// apply player scaling
function calculateScaledXP(baseXP,npcLevel,playerLevel){

    const levelDiff = playerLevel - npcLevel;

    const modifier = Math.max(0.1, 1 - (levelDiff * levelPenalty));

    return Math.round(baseXP * modifier);
}

function renderTable(){

    const playerLevel = parseInt(document.getElementById("playerLevel").value) || 1;

    const tbody = document.querySelector("#npcTable tbody");
    tbody.innerHTML = "";

    npcData.forEach(npc=>{

        const hp = npc.vitals?.hp || 0;
        const atk = npc.stats?.atk || 0;
        const def = npc.stats?.def || 0;
        const rdf = npc.stats?.rdf || 0;
        const mdf = npc.stats?.mdf || 0;

        const totalStats = hp + atk + def + rdf + mdf;

        const npcLevel = estimateNPCLevel(totalStats);

        const baseXP = calculateBaseXP(npc);

        const scaledXP = calculateScaledXP(baseXP,npcLevel,playerLevel);

        const xpPerHp = hp ? (scaledXP/hp).toFixed(2) : 0;

        let spriteHTML = "";

        if(typeof npc.sprite === "number"){

            const sheetIndex = Math.floor(npc.sprite / SPRITES_PER_SHEET);
            const spriteIndex = npc.sprite % SPRITES_PER_SHEET;

            const x = (spriteIndex % spritesPerRow) * SPRITE_SIZE;
            const y = Math.floor(spriteIndex / spritesPerRow) * SPRITE_SIZE;

            const bg = `url('images/npcs${sheetIndex}.png')`;

            spriteHTML = `
            <div class="sprite" style="
                background-image:${bg};
                background-position:-${x}px -${y}px;
                width:${SPRITE_SIZE}px;
                height:${SPRITE_SIZE}px;
                display:inline-block;
                margin-right:6px;">
            </div>`;
        }

        const row = document.createElement("tr");

        row.innerHTML = `
        <td>${spriteHTML}${npc.name}</td>
        <td>${hp}</td>
        <td>${atk}</td>
        <td>${def}</td>
        <td>${rdf}</td>
        <td>${mdf}</td>
        <td>${npcLevel}</td>
        <td>${baseXP}</td>
        <td>${scaledXP}</td>
        <td>${xpPerHp}</td>
        `;

        tbody.appendChild(row);

    });

}

// load npc.json
fetch("npc.json")
.then(r=>r.json())
.then(data=>{

    npcData = data;

    renderTable();

});

// update when player level changes
document.getElementById("playerLevel").addEventListener("input",renderTable);

// search filter
document.getElementById("searchBox").addEventListener("keyup",function(){

    const val = this.value.toLowerCase();
    const rows = document.querySelectorAll("#npcTable tbody tr");

    rows.forEach(row=>{
        row.style.display =
        row.innerText.toLowerCase().includes(val) ? "" : "none";
    });

});

</script>

</body>
</html>
