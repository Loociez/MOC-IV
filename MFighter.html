<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mirage Fighter</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
:root {
  --void: #0a0810;
  --panel: #151222;
  --panel-raised: #1d1830;
  --border: #2f2846;
  --text: #f1eefc;
  --muted: #948dae;

  --violet: #7c5cff;
  --violet-dim: rgba(124, 92, 255, 0.16);
  --amber: #ffb347;
  --blue: #4da3ff;
  --red: #ff5470;
  --win: #33d17a;
  --lose: #ff5470;

  --font-display: 'Bebas Neue', sans-serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; }

/* =========================
   BACKGROUND
========================= */
body {
  margin: 0;
  color: var(--text);
  font-family: var(--font-body);
  overflow-x: hidden;

  background:
    radial-gradient(circle at 15% 0%, rgba(124,92,255,0.16), transparent 42%),
    radial-gradient(circle at 85% 10%, rgba(255,179,71,0.09), transparent 40%),
    radial-gradient(circle at 50% 100%, rgba(77,163,255,0.07), transparent 55%),
    linear-gradient(180deg, #0c0a14, #05040a);

  background-attachment: fixed;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center, rgba(255,255,255,0.03), transparent 70%);
  animation: ambientGlow 6s ease-in-out infinite alternate;
  pointer-events: none;
}
@keyframes ambientGlow { from { opacity: 0.2; } to { opacity: 0.5; } }

/* =========================
   HEADER / NAV
========================= */
header.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  background: rgba(10, 8, 16, 0.6);
  backdrop-filter: blur(6px);
  position: relative;
  z-index: 5;
}

.brandBlock { display: flex; align-items: baseline; gap: 10px; }
.brandBlock .logo {
  font-family: var(--font-display);
  font-size: 28px;
  letter-spacing: 1.5px;
}
.brandBlock .logo span { color: var(--violet); }
.brandBlock .versionTag {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--amber);
  border: 1px solid rgba(255,179,71,0.35);
  background: rgba(255,179,71,0.08);
  padding: 3px 8px;
  border-radius: 20px;
  letter-spacing: 0.5px;
}

.navRight { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

.walletChip {
  font-family: var(--font-mono);
  font-size: 13px;
  background: var(--panel-raised);
  border: 1px solid var(--border);
  padding: 8px 14px;
  border-radius: 20px;
  color: var(--text);
}
.walletChip b { color: var(--win); }

button.navBtn, a.navBtn {
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 13px;
  text-decoration: none;
  color: var(--text);
  background: var(--panel-raised);
  border: 1px solid var(--border);
  padding: 9px 14px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.15s;
}
button.navBtn:hover, a.navBtn:hover { border-color: var(--violet); color: var(--text); }
a.navBtn.primary {
  background: linear-gradient(135deg, var(--violet), #5a3fd6);
  border: none;
  color: white;
}
a.navBtn.primary:hover { filter: brightness(1.1); }

/* =========================
   ROUND MARQUEE
========================= */
#roundDisplay {
  text-align: center;
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin: 16px 0 10px;
}
#roundDisplay::before, #roundDisplay::after {
  content: "—";
  color: var(--border);
  margin: 0 10px;
}

/* =========================
   LAYOUT
========================= */
.layout {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  gap: 16px;
  padding: 0 20px 32px;
  flex-wrap: wrap;
  max-width: 1240px;
  margin: 0 auto;
}

.column { display: flex; flex-direction: column; gap: 14px; width: 270px; flex-shrink: 0; }
.arenaCol { display: flex; flex-direction: column; align-items: center; gap: 10px; }

/* =========================
   PANELS
========================= */
.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

.panelHeader {
  padding: 10px 14px;
  background: var(--panel-raised);
  border-bottom: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 11.5px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 8px;
}
.panelHeader .liveDot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--red);
  box-shadow: 0 0 8px var(--red);
  animation: pulseDot 1.4s infinite;
}
@keyframes pulseDot { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

.panelBody { padding: 14px; }

/* =========================
   BETTING
========================= */
.cornerBtns { display: flex; gap: 8px; }
button.betBtn {
  flex: 1;
  padding: 12px 8px;
  border-radius: 8px;
  border: 1px solid var(--border);
  font-family: var(--font-display);
  font-size: 16px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: 0.15s;
  color: white;
}
#betBlue { background: linear-gradient(135deg, #2a5cc9, #1c3f8f); }
#betBlue:hover { filter: brightness(1.15); transform: translateY(-1px); }
#betRed { background: linear-gradient(135deg, #d63a56, #99223a); }
#betRed:hover { filter: brightness(1.15); transform: translateY(-1px); }

label.fieldLabel {
  display: block;
  margin-top: 12px;
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 600;
}

input {
  width: 100%;
  padding: 9px 10px;
  margin-top: 5px;
  background: var(--void);
  border: 1px solid var(--border);
  color: white;
  text-align: center;
  border-radius: 7px;
  font-family: var(--font-mono);
}
input:focus { outline: none; border-color: var(--violet); }

#playerMoneyDisplay {
  margin-top: 14px;
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 15px;
  color: var(--win);
}
#currentBet {
  font-size: 12.5px;
  color: var(--muted);
  margin-top: 4px;
  font-family: var(--font-mono);
}
#result {
  margin-top: 10px;
  font-weight: 700;
  min-height: 20px;
  font-family: var(--font-mono);
  font-size: 14px;
}
.win { color: var(--win); }
.lose { color: var(--lose); }

button#resetMoneyBtn {
  width: 100%;
  margin-top: 14px;
  padding: 8px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 7px;
  font-size: 12px;
  cursor: pointer;
  transition: 0.15s;
}
button#resetMoneyBtn:hover { color: var(--text); border-color: var(--violet); }

/* =========================
   MUSIC PANEL
========================= */
.musicButtons { display: flex; flex-direction: column; gap: 8px; }
.musicButtons button {
  padding: 10px;
  background: var(--panel-raised);
  color: white;
  border: 1px solid var(--border);
  border-radius: 7px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition: 0.15s;
}
.musicButtons button:hover { border-color: var(--violet); background: var(--violet-dim); }

/* =========================
   CANVAS / ARENA
========================= */
.canvasFrame {
  background: linear-gradient(180deg, var(--panel-raised), var(--panel));
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 10px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(124,92,255,0.06);
}

canvas {
  display: block;
  background: #111;
  border-radius: 8px;
  transition: transform 0.05s linear;
}

canvas.fullscreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 9999;
  border-radius: 0;
}

.arenaControls {
  display: flex;
  gap: 8px;
  width: 100%;
}
.arenaControls button {
  flex: 1;
  padding: 9px;
  background: var(--panel-raised);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 7px;
  cursor: pointer;
  font-size: 12.5px;
  font-weight: 600;
  transition: 0.15s;
}
.arenaControls button:hover { border-color: var(--violet); }

/* =========================
   🟢 CAMERA SHAKE / FLASH / TEXT
========================= */
.shake { animation: shake 0.25s linear; }
@keyframes shake {
  0% { transform: translate(0,0); }
  20% { transform: translate(-4px,2px); }
  40% { transform: translate(4px,-2px); }
  60% { transform: translate(-3px,2px); }
  80% { transform: translate(3px,-1px); }
  100% { transform: translate(0,0); }
}

#flash {
  position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
  background: rgba(255, 80, 80, 0.2);
  opacity: 0;
  pointer-events: none;
  z-index: 99999;
  transition: opacity 0.15s ease-out;
}

#centerText {
  position: fixed;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: var(--font-display);
  font-size: 46px;
  letter-spacing: 2px;
  color: var(--amber);
  text-shadow: 0 0 16px rgba(0,0,0,0.8), 0 0 30px rgba(255,179,71,0.4);
  opacity: 0;
  pointer-events: none;
  z-index: 99998;
  transition: opacity 0.2s ease;
}

/* =========================
   FIGHT FEED
========================= */
#fightFeed { display: flex; flex-direction: column; height: 400px; }
#fightFeedLog {
  flex: 1;
  overflow-y: auto;
  padding: 12px 14px;
  font-size: 12px;
  font-family: var(--font-mono);
}
#fightFeedLog::-webkit-scrollbar { width: 6px; }
#fightFeedLog::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.log { margin-bottom: 6px; line-height: 1.4; }
.system { color: var(--blue); }
.ko { color: var(--red); font-weight: 700; }

/* =========================
   LEADERBOARD
========================= */
#leaderboardList { font-size: 12px; color: var(--text); font-family: var(--font-mono); }

/* =========================
   DISABLED
========================= */
button:disabled, input:disabled { opacity: 0.35; cursor: not-allowed; }

@media (max-width: 900px) {
  .layout { flex-direction: column; align-items: center; }
  .column { width: 100%; max-width: 420px; }
  canvas { max-width: 100%; height: auto; }
}
</style>
</head>

<body>

<div id="flash"></div>
<div id="centerText"></div>

<header class="topbar">
  <div class="brandBlock">
    <div class="logo">MIRAGE <span>FIGHTER</span></div>
    <div class="versionTag">v1.2 BETA</div>
  </div>
  <div class="navRight">
    <div class="walletChip">💰 <b id="headerMoney">$1000</b></div>
    <button class="navBtn" id="resetMoneyBtn">Reset Money</button>
    <a class="navBtn primary" href="./aiBuild.html">⚔️ AI Fight Lab</a>
  </div>
</header>

<div id="roundDisplay">Fight: 1</div>

<div class="layout">

  <div class="column">

    <div class="panel">
      <div class="panelHeader"><span class="liveDot"></span>Place Your Bet</div>
      <div class="panelBody" id="betting">
        <div class="cornerBtns">
          <button id="betBlue" class="betBtn">BLUE</button>
          <button id="betRed" class="betBtn">RED</button>
        </div>

        <label class="fieldLabel">Bet amount</label>
        <input type="number" id="betAmountInput" value="100" />

        <div id="playerMoneyDisplay">Money: $1000</div>
        <div id="currentBet">Current bet: None</div>
        <div id="result"></div>
      </div>
    </div>

    <div class="panel" id="musicPanel">
      <div class="panelHeader">Arena Controls</div>
      <div class="panelBody musicButtons">
        <button id="muteBtn">🔊 Mute Music</button>
        <button id="fullscreenBtn">🖥️ Fullscreen Arena</button>
      </div>
    </div>

  </div>

  <div class="arenaCol">
    <div class="canvasFrame">
      <canvas id="gameCanvas" width="825" height="400"></canvas>
    </div>
  </div>

  <div class="column">

    <div class="panel" id="fightFeed">
      <div class="panelHeader" id="fightFeedHeader"><span class="liveDot"></span>Live Feed</div>
      <div id="fightFeedLog"></div>
    </div>

    <div class="panel" id="leaderboardPanel">
      <div class="panelHeader">🏆 Fighters ELO</div>
      <div class="panelBody">
        <div id="leaderboardList"><!-- Rankings will appear here --></div>
      </div>
    </div>

  </div>

</div>

<script type="module" src="./game.js"></script>

<script>
  let money = parseInt(localStorage.getItem('playerMoney')) || 1000;

  const moneyDisplay = document.getElementById("playerMoneyDisplay");
  const headerMoneyDisplay = document.getElementById("headerMoney");
  const currentBetDisplay = document.getElementById("currentBet");
  const resultDisplay = document.getElementById("result");
  const feed = document.getElementById("fightFeedLog");

  const muteBtn = document.getElementById("muteBtn");
  const fullscreenBtn = document.getElementById("fullscreenBtn");
  const canvas = document.getElementById("gameCanvas");

  const flash = document.getElementById("flash");
  const centerText = document.getElementById("centerText");

  let betLocked = false;
  let currentBet = null;
  let betAmount = 0;

  let bettingAllowed = true;

  function setBettingAllowed(state) {
  bettingAllowed = state;

  document.getElementById("betBlue").disabled = !state;
  document.getElementById("betRed").disabled = !state;
  document.getElementById("betAmountInput").disabled = !state;

  if (state) {
    // ONLY reset if round is truly over AND no active bet is locked
    if (!betLocked) {
      currentBet = null;
      betAmount = 0;

      currentBetDisplay.textContent = "Current bet: None";
      resultDisplay.textContent = "";
    }
  }
}

  window.setBettingAllowed = setBettingAllowed;

  function updateMoney() {
    moneyDisplay.textContent = "Money: $" + money;
    if (headerMoneyDisplay) headerMoneyDisplay.textContent = "$" + money;
  }
  updateMoney();

  function placeBet(amount, color) {
    if (!bettingAllowed) return false;
    if (betLocked) return false;
    if (amount <= 0) return false;
    if (amount > money) return false;

    money -= amount;
    localStorage.setItem("playerMoney", money);
    updateMoney();

    betLocked = true;
    currentBet = color;
    betAmount = amount;

    currentBetDisplay.textContent = `Current bet: ${color.toUpperCase()} ($${amount})`;
    resultDisplay.textContent = "";

    return true;
  }

  function resolveFight(winner) {
  if (!currentBet) return;

  if (winner === currentBet) {
    const winnings = betAmount * 2;
    money += winnings;
    resultDisplay.textContent = `WIN +$${winnings}`;
    resultDisplay.className = "win";
  } else {
    resultDisplay.textContent = `LOSS -$${betAmount}`;
    resultDisplay.className = "lose";
  }

  localStorage.setItem("playerMoney", money);
  updateMoney();

  // IMPORTANT: only reset bet, NOT betting system
  betLocked = false;
  currentBet = null;
  betAmount = 0;

  currentBetDisplay.textContent = "Current bet: None";
}

  function resetBet() {
    betLocked = false;
    currentBet = null;
    betAmount = 0;
    currentBetDisplay.textContent = "Current bet: None";
  }

  function log(msg, type="system") {
    const d = document.createElement("div");
    d.className = "log " + type;
    d.textContent = msg;
    feed.appendChild(d);
    feed.scrollTop = feed.scrollHeight;
  }

  window.pushFightLog = log;

  window.effects = {

    shake() {
      canvas.classList.add("shake");
      setTimeout(() => canvas.classList.remove("shake"), 250);
    },

    flash() {
  flash.style.background = 'rgba(255, 80, 80, 0.25)'; // softer red
  flash.style.opacity = 1;

  setTimeout(() => {
    flash.style.opacity = 0;
  }, 100);
},

    text(msg, time=1000) {
      centerText.textContent = msg;
      centerText.style.opacity = 1;
      setTimeout(() => centerText.style.opacity = 0, time);
    },

    startRound() {
  // lock betting FIRST
  setBettingAllowed(false);

  // hard reset before fight begins
  betLocked = false;
  currentBet = null;
  betAmount = 0;

  currentBetDisplay.textContent = "Current bet: None";
  resultDisplay.textContent = "";

  this.text("FIGHT!", 800);
},

    endRound() {
      setBettingAllowed(true);
      this.text("ROUND OVER", 1200);
    }
  };

  document.getElementById("betBlue").onclick = () => {
    const amt = +document.getElementById("betAmountInput").value;
    if (!placeBet(amt, "blue")) return;
    log("💙 Bet placed on BLUE", "system");
  };

  document.getElementById("betRed").onclick = () => {
    const amt = +document.getElementById("betAmountInput").value;
    if (!placeBet(amt, "red")) return;
    log("❤️ Bet placed on RED", "system");
  };

  document.getElementById("resetMoneyBtn").onclick = () => {
    money = 1000;
    localStorage.setItem("playerMoney", money);
    updateMoney();
    log("💰 Money reset to $1000", "system");
  };

  let muted = false;

  muteBtn.onclick = () => {
    muted = !muted;
    if (window.__gameMusic) window.__gameMusic.muted = muted;
    muteBtn.textContent = muted ? "🔇 Unmute Music" : "🔊 Mute Music";
  };

  let fullscreen = false;

  fullscreenBtn.onclick = () => {
    fullscreen = !fullscreen;
    canvas.classList.toggle("fullscreen", fullscreen);

    fullscreenBtn.textContent = fullscreen
      ? "🡼 Exit Fullscreen"
      : "🖥️ Fullscreen Arena";
  };

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && fullscreen) {
      fullscreen = false;
      canvas.classList.remove("fullscreen");
      fullscreenBtn.textContent = "🖥️ Fullscreen Arena";
    }
  });

  window.betSystem = {
    getBet: () => currentBet,
    getAmount: () => betAmount,
    resolveFight,
    resetBet
  };
</script>

</body>
</html>
