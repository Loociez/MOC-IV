<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mirage Fighter</title>

  <style>
    :root {
      --bg: #0b0b0f;
      --panel: #15151d;
      --panel2: #1c1c26;
      --border: #2c2c3a;
      --text: #eaeaf2;
      --muted: #9a9aa8;
      --accent: #6c5ce7;
      --win: #2ecc71;
      --lose: #e74c3c;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at top, #151522, var(--bg));
      color: var(--text);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    h1 {
      margin: 10px 0;
      text-align: center;
      font-size: 24px;
    }

    #resetMoneyBtn {
      display: block;
      margin: 0 auto 10px;
      padding: 8px 14px;
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
    }

    #roundDisplay {
      text-align: center;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .layout {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 12px;
      padding: 0 10px;
    }

    canvas {
      background: #111;
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    #betting {
      width: 260px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
    }

    button {
      width: 100%;
      margin: 4px 0;
      padding: 10px;
      background: #222235;
      color: white;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent);
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 6px;
      background: #111;
      border: 1px solid var(--border);
      color: white;
      text-align: center;
      border-radius: 6px;
    }

    #playerMoneyDisplay {
      margin-top: 10px;
      font-weight: bold;
    }

    #currentBet {
      font-size: 13px;
      color: var(--muted);
    }

    #result {
      margin-top: 8px;
      font-weight: bold;
      min-height: 20px;
    }

    .win { color: #2ecc71; }
    .lose { color: #e74c3c; }

    #fightFeed {
      width: 260px;
      height: 400px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
    }

    #fightFeedHeader {
      padding: 8px;
      background: var(--panel2);
      border-bottom: 1px solid var(--border);
      font-weight: bold;
      text-align: center;
    }

    #fightFeedLog {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      font-size: 12px;
      text-align: left;
    }

    .log { margin-bottom: 5px; }
    .crit { color: #ffd166; }
    .hit { color: #ff4d4d; }
    .miss { color: #aaa; }
    .system { color: #66ccff; }
    .ko { color: #ff006e; font-weight: bold; }
  </style>
</head>

<body>

<h1>MFB - Mirage Fighter Bot</h1>
<button id="resetMoneyBtn">Reset Money to 1000</button>
<div id="roundDisplay">Fight: 1</div>

<div class="layout">

  <div id="betting">
    <button id="betBlue">Bet Blue</button>
    <button id="betRed">Bet Red</button>

    <input type="number" id="betAmountInput" value="100" />

    <div id="playerMoneyDisplay">Money: $1000</div>
    <div id="currentBet">Current bet: None</div>
    <div id="result"></div>
  </div>

  <canvas id="gameCanvas" width="800" height="400"></canvas>

  <div id="fightFeed">
    <div id="fightFeedHeader">LIVE FEED</div>
    <div id="fightFeedLog"></div>
  </div>

</div>

<script type="module" src="./game.js"></script>

<script>
  let money = parseInt(localStorage.getItem('playerMoney')) || 1000;

  const moneyDisplay = document.getElementById("playerMoneyDisplay");
  const feed = document.getElementById("fightFeedLog");

  let betLocked = false;
  let currentBet = null;
  let betAmount = 0;

  function updateMoney() {
    moneyDisplay.textContent = "Money: $" + money;
  }
  updateMoney();

  function placeBet(amount, color) {
    if (betLocked) return false;
    if (amount > money) return false;

    money -= amount;
    localStorage.setItem("playerMoney", money);
    updateMoney();

    betLocked = true;
    currentBet = color;
    betAmount = amount;

    return true;
  }

  function payout(amount) {
    money += amount;
    localStorage.setItem("playerMoney", money);
    updateMoney();
  }

  function log(msg, type="system") {
    const d = document.createElement("div");
    d.className = "log " + type;
    d.textContent = msg;
    feed.appendChild(d);
    feed.scrollTop = feed.scrollHeight;
  }

  window.pushFightLog = log;

  log("Arena loaded...", "system");

  document.getElementById("betBlue").onclick = () => {
    const amt = +document.getElementById("betAmountInput").value;
    if (!placeBet(amt, "blue")) return;

    log("💙 Bet placed on BLUE", "system");
  };

  document.getElementById("betRed").onclick = () => {
    const amt = +document.getElementById("betAmountInput").value;
    if (!placeBet(amt, "red")) return;

    log("❤️ Bet placed on RED", "system");
  };

  document.getElementById("resetMoneyBtn").onclick = () => {
    money = 1000;
    localStorage.setItem("playerMoney", money);
    updateMoney();

    log("💰 Money reset to $1000", "system");
  };

  /* expose for game.js if needed */
  window.betSystem = {
    getBet: () => currentBet,
    getAmount: () => betAmount,
    resetBet: () => {
      betLocked = false;
      currentBet = null;
      betAmount = 0;
    }
  };
</script>

</body>
</html>
