<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mirage Fighter</title>

  <style>
:root {
  --bg: #0b0b0f;
  --panel: #15151d;
  --panel2: #1c1c26;
  --border: #2c2c3a;
  --text: #eaeaf2;
  --muted: #9a9aa8;
  --accent: #6c5ce7;
  --win: #2ecc71;
  --lose: #e74c3c;
}

/* =========================
   🟣 BACKGROUND UPGRADE
========================= */
body {
  margin: 0;
  color: var(--text);
  font-family: Arial, sans-serif;
  overflow: hidden;

  /* layered dark background */
  background:
    radial-gradient(circle at 20% 10%, rgba(108,92,231,0.15), transparent 40%),
    radial-gradient(circle at 80% 20%, rgba(255,0,110,0.10), transparent 40%),
    radial-gradient(circle at 50% 100%, rgba(0,200,255,0.08), transparent 50%),
    linear-gradient(180deg, #0a0a12, #050509);

  background-attachment: fixed;
}

/* subtle animated glow */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center, rgba(255,255,255,0.03), transparent 70%);
  animation: ambientGlow 6s ease-in-out infinite alternate;
  pointer-events: none;
}

@keyframes ambientGlow {
  from { opacity: 0.2; }
  to { opacity: 0.5; }
}
.version-title {
  text-align: center;
  width: 100%;
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 10px;
  color: orange;
  text-shadow: 0 2px 6px rgba(0,0,0,0.6);
}
/* =========================
   🟣 BANNER HEADER
========================= */
h1 {
  margin: 0;
  text-align: center;
  font-size: 26px;
  font-weight: bold;
  letter-spacing: 1px;

  padding: 14px 0;

  /* banner background image */
  background: 
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url('./banner.png'); /* 🔁 replace with your image */

  background-size: cover;
  background-position: center;

  border-bottom: 1px solid var(--border);

  text-shadow:
    0 0 10px rgba(0,0,0,0.9),
    0 0 20px rgba(108,92,231,0.4);
}

/* =========================
   UI
========================= */
#resetMoneyBtn {
  display: block;
  margin: 10px auto;
  padding: 8px 14px;
  background: var(--panel);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
}

#roundDisplay {
  text-align: center;
  color: var(--muted);
  margin-bottom: 10px;
}

.layout {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  gap: 12px;
  padding: 0 10px;
}

/* =========================
   CANVAS
========================= */
canvas {
  background: #111;
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  transition: transform 0.05s linear;
}

canvas.fullscreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 9999;
  border-radius: 0;
}

/* =========================
   🟢 CAMERA SHAKE
========================= */
.shake {
  animation: shake 0.25s linear;
}

@keyframes shake {
  0% { transform: translate(0,0); }
  20% { transform: translate(-4px,2px); }
  40% { transform: translate(4px,-2px); }
  60% { transform: translate(-3px,2px); }
  80% { transform: translate(3px,-1px); }
  100% { transform: translate(0,0); }
}

/* =========================
   🟢 FLASH EFFECT (SOFT)
========================= */
#flash {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;

  background: rgba(255, 80, 80, 0.2);
  opacity: 0;

  pointer-events: none;
  z-index: 99999;

  transition: opacity 0.15s ease-out;
}

/* =========================
   CENTER TEXT
========================= */
#centerText {
  position: fixed;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 40px;
  font-weight: bold;
  color: orange;
  text-shadow: 0 0 12px black;
  opacity: 0;
  pointer-events: none;
  z-index: 99998;
  transition: opacity 0.2s ease;
}

/* =========================
   PANELS
========================= */
#betting,
#fightFeed,
#musicPanel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
}

/* betting panel */
#betting {
  width: 260px;
  padding: 10px;
}

/* fight feed */
#fightFeed {
  width: 260px;
  height: 400px;
  display: flex;
  flex-direction: column;
}

#fightFeedHeader {
  padding: 8px;
  background: var(--panel2);
  border-bottom: 1px solid var(--border);
  font-weight: bold;
  text-align: center;
}

#fightFeedLog {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
  font-size: 12px;
}

/* =========================
   BUTTONS
========================= */
button {
  width: 100%;
  margin: 4px 0;
  padding: 10px;
  background: #222235;
  color: white;
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  transition: 0.15s;
}

button:hover {
  background: var(--accent);
  box-shadow: 0 0 10px rgba(108,92,231,0.4);
}

/* =========================
   INPUT
========================= */
input {
  width: 100%;
  padding: 8px;
  margin-top: 6px;
  background: #111;
  border: 1px solid var(--border);
  color: white;
  text-align: center;
  border-radius: 6px;
}

/* =========================
   TEXT / LOG
========================= */
#playerMoneyDisplay {
  margin-top: 10px;
  font-weight: bold;
}

#currentBet {
  font-size: 13px;
  color: var(--muted);
}

#result {
  margin-top: 8px;
  font-weight: bold;
  min-height: 20px;
}

.win { color: var(--win); }
.lose { color: var(--lose); }

.log { margin-bottom: 5px; }
.system { color: #66ccff; }
.ko { color: #ff006e; font-weight: bold; }

/* =========================
   MUSIC PANEL
========================= */
#musicPanel {
  width: 260px;
  margin-top: 10px;
  padding: 10px;
}

#musicTitle {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 6px;
  text-align: center;
}

/* =========================
   DISABLED
========================= */
button:disabled,
input:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
</style>
</head>

<body>

<div id="flash"></div>
<div id="centerText"></div>

<div id="banner" style="display: flex; justify-content: center; width: 100%; overflow: hidden;">
    <img src="./banner.png" alt="Mirage Fighter Bot" 
         style="width: 100%; max-width: 1200px; height: 150px; object-fit: cover; object-position: center;">
</div>


</div>
<div class="version-title">Version 1.2Beta</div>
<button id="resetMoneyBtn">Reset Money to 1000</button>
<div id="roundDisplay">Fight: 1</div>

<div class="layout">

  <div>

    <div id="betting">
      <button id="betBlue">Bet Blue</button>
      <button id="betRed">Bet Red</button>

      <input type="number" id="betAmountInput" value="100" />

      <div id="playerMoneyDisplay">Money: $1000</div>
      <div id="currentBet">Current bet: None</div>
      <div id="result"></div>
    </div>

    <div id="musicPanel">
      <div id="musicTitle">Music: Ready</div>
      <button id="muteBtn">🔊 Mute Music</button>
      <button id="fullscreenBtn">🖥️ Fullscreen Arena</button>
    </div>

  </div>

  <canvas id="gameCanvas" width="800" height="400"></canvas>

  <div id="fightFeed">
    <div id="fightFeedHeader">LIVE FEED</div>
    <div id="fightFeedLog"></div>
  </div>
<!-- Add this to your HTML layout -->
<div id="leaderboardPanel" style="background: var(--panel); border: 1px solid var(--border); border-radius: 10px; width: 260px; margin-top: 10px; padding: 10px;">
  <div style="font-weight: bold; text-align: center; border-bottom: 1px solid var(--border); padding-bottom: 5px; margin-bottom: 8px;">🏆 FIGHTERS ELO</div>
  <div id="leaderboardList" style="font-size: 12px; color: var(--text);">
    <!-- Rankings will appear here -->
  </div>
</div>

</div>

<script type="module" src="./game.js"></script>

<script>
  let money = parseInt(localStorage.getItem('playerMoney')) || 1000;

  const moneyDisplay = document.getElementById("playerMoneyDisplay");
  const currentBetDisplay = document.getElementById("currentBet");
  const resultDisplay = document.getElementById("result");
  const feed = document.getElementById("fightFeedLog");

  const muteBtn = document.getElementById("muteBtn");
  const fullscreenBtn = document.getElementById("fullscreenBtn");
  const canvas = document.getElementById("gameCanvas");

  const flash = document.getElementById("flash");
  const centerText = document.getElementById("centerText");

  let betLocked = false;
  let currentBet = null;
  let betAmount = 0;

  let bettingAllowed = true;

  function setBettingAllowed(state) {
  bettingAllowed = state;

  document.getElementById("betBlue").disabled = !state;
  document.getElementById("betRed").disabled = !state;
  document.getElementById("betAmountInput").disabled = !state;

  if (state) {
    // ONLY reset if round is truly over AND no active bet is locked
    if (!betLocked) {
      currentBet = null;
      betAmount = 0;

      currentBetDisplay.textContent = "Current bet: None";
      resultDisplay.textContent = "";
    }
  }
}

  window.setBettingAllowed = setBettingAllowed;

  function updateMoney() {
    moneyDisplay.textContent = "Money: $" + money;
  }
  updateMoney();

  function placeBet(amount, color) {
    if (!bettingAllowed) return false;
    if (betLocked) return false;
    if (amount <= 0) return false;
    if (amount > money) return false;

    money -= amount;
    localStorage.setItem("playerMoney", money);
    updateMoney();

    betLocked = true;
    currentBet = color;
    betAmount = amount;

    currentBetDisplay.textContent = `Current bet: ${color.toUpperCase()} ($${amount})`;
    resultDisplay.textContent = "";

    return true;
  }

  function resolveFight(winner) {
  if (!currentBet) return;

  if (winner === currentBet) {
    const winnings = betAmount * 2;
    money += winnings;
    resultDisplay.textContent = `WIN +$${winnings}`;
    resultDisplay.className = "win";
  } else {
    resultDisplay.textContent = `LOSS -$${betAmount}`;
    resultDisplay.className = "lose";
  }

  localStorage.setItem("playerMoney", money);
  updateMoney();

  // IMPORTANT: only reset bet, NOT betting system
  betLocked = false;
  currentBet = null;
  betAmount = 0;

  currentBetDisplay.textContent = "Current bet: None";
}

  function resetBet() {
    betLocked = false;
    currentBet = null;
    betAmount = 0;
    currentBetDisplay.textContent = "Current bet: None";
  }

  function log(msg, type="system") {
    const d = document.createElement("div");
    d.className = "log " + type;
    d.textContent = msg;
    feed.appendChild(d);
    feed.scrollTop = feed.scrollHeight;
  }

  window.pushFightLog = log;

  window.effects = {

    shake() {
      canvas.classList.add("shake");
      setTimeout(() => canvas.classList.remove("shake"), 250);
    },

    flash() {
  flash.style.background = 'rgba(255, 80, 80, 0.25)'; // softer red
  flash.style.opacity = 1;

  setTimeout(() => {
    flash.style.opacity = 0;
  }, 100);
},

    text(msg, time=1000) {
      centerText.textContent = msg;
      centerText.style.opacity = 1;
      setTimeout(() => centerText.style.opacity = 0, time);
    },

    startRound() {
  // lock betting FIRST
  setBettingAllowed(false);

  // hard reset before fight begins
  betLocked = false;
  currentBet = null;
  betAmount = 0;

  currentBetDisplay.textContent = "Current bet: None";
  resultDisplay.textContent = "";

  this.text("FIGHT!", 800);
},

    endRound() {
      setBettingAllowed(true);
      this.text("ROUND OVER", 1200);
    }
  };

  document.getElementById("betBlue").onclick = () => {
    const amt = +document.getElementById("betAmountInput").value;
    if (!placeBet(amt, "blue")) return;
    log("💙 Bet placed on BLUE", "system");
  };

  document.getElementById("betRed").onclick = () => {
    const amt = +document.getElementById("betAmountInput").value;
    if (!placeBet(amt, "red")) return;
    log("❤️ Bet placed on RED", "system");
  };

  document.getElementById("resetMoneyBtn").onclick = () => {
    money = 1000;
    localStorage.setItem("playerMoney", money);
    updateMoney();
    log("💰 Money reset to $1000", "system");
  };

  let muted = false;

  muteBtn.onclick = () => {
    muted = !muted;
    if (window.__gameMusic) window.__gameMusic.muted = muted;
    muteBtn.textContent = muted ? "🔇 Unmute Music" : "🔊 Mute Music";
  };

  let fullscreen = false;

  fullscreenBtn.onclick = () => {
    fullscreen = !fullscreen;
    canvas.classList.toggle("fullscreen", fullscreen);

    fullscreenBtn.textContent = fullscreen
      ? "🡼 Exit Fullscreen"
      : "🖥️ Fullscreen Arena";
  };

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && fullscreen) {
      fullscreen = false;
      canvas.classList.remove("fullscreen");
      fullscreenBtn.textContent = "🖥️ Fullscreen Arena";
    }
  });

  window.betSystem = {
    getBet: () => currentBet,
    getAmount: () => betAmount,
    resolveFight,
    resetBet
  };
</script>

</body>
</html>
